<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gastos v4.3</title>
  <meta name="theme-color" content="#2a0b14" />
  <style>
    :root{
      --bg:#2a0b14;
      --card:#3a0f1c;
      --fg:#ffffff;
      --muted:#e6c8d0;
      --line:#5c1a2b;
      --accent:#b91c3c;
      --accent2:#ef476f;
      --good:#16a34a;
      --danger:#dc2626;
      --soft:#4a1423;
      --warn:#f59e0b;
      --violet:#8b5cf6;
      --r:16px;
      --navH:82px;
      --shadow:0 12px 28px rgba(0,0,0,.28);
    }

    *{ box-sizing:border-box; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      color:var(--fg);
      background:
        radial-gradient(900px 500px at 15% -10%, rgba(185,28,60,.18), transparent 55%),
        radial-gradient(900px 500px at 90% 0%, rgba(239,71,111,.10), transparent 55%),
        linear-gradient(180deg, var(--bg), #220811);
      min-height:100vh;
    }

    header{
      position:sticky; top:0; z-index:20;
      background:#2a0b14;
      background:color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter:blur(10px) saturate(160%);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .title{display:flex; flex-direction:column; gap:2px;}
    h1{margin:0; font-size:18px; letter-spacing:.2px;}
    .sub{font-size:12px; color:var(--muted);}
    .topRight{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}

    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:999px;
      white-space:nowrap;
      background:#32101c;
    }

    .versionBadge{
      font-size:12px;
      color:#fff1f4;
      border:1px solid rgba(239,71,111,.35);
      padding:6px 10px;
      border-radius:999px;
      background:linear-gradient(135deg, rgba(185,28,60,.38), rgba(139,92,246,.18));
      white-space:nowrap;
    }

    main{
      padding:14px 14px calc(var(--navH) + 22px);
      max-width:1120px;
      margin:0 auto;
    }

    .card{
      background:#3a0f1c;
      background:color-mix(in srgb, var(--card) 92%, rgba(239,71,111,.05));
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:14px;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }

    .row{display:grid; gap:10px;}
    @media(min-width:640px){
      .row.two{grid-template-columns:1fr 1fr;}
      .row.three{grid-template-columns:1fr 1fr 1fr;}
      .row.four{grid-template-columns:1fr 1fr 1fr 1fr;}
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:12px;
      color:var(--muted);
    }

    input, select, textarea{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#32101c;
      color:var(--fg);
      outline:none;
    }

    input:focus, select:focus, textarea:focus{
      border-color:rgba(239,71,111,.6);
      box-shadow:0 0 0 3px rgba(185,28,60,.16);
    }

    textarea{min-height:70px; resize:vertical;}

    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:10px;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
      background:var(--accent);
    }

    button.secondary{background:var(--soft); border:1px solid var(--line);}
    button.good{background:var(--good);}
    button.danger{background:var(--danger);}
    button.warn{background:var(--warn); color:#111827;}
    button.violet{background:var(--violet);}
    button:active{transform:translateY(1px);}
    button.small{
      padding:7px 10px;
      font-size:12px;
      border-radius:10px;
    }

    .kpi{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    @media(min-width:760px){
      .kpi.four{grid-template-columns:repeat(4,1fr);}
      .kpi.five{grid-template-columns:repeat(5,1fr);}
      .kpi.six{grid-template-columns:repeat(6,1fr);}
    }

    .k{
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#32101c;
    }

    .k .t{font-size:12px; color:var(--muted);}
    .k .v{font-size:18px; font-weight:900; margin-top:6px;}

    .k.negative{
      border-color:rgba(220,38,38,.45);
      background:color-mix(in srgb, var(--danger) 10%, #32101c);
    }

    .k.positive{
      border-color:rgba(22,163,74,.45);
      background:color-mix(in srgb, var(--good) 10%, #32101c);
    }

    .view{display:none;}
    .view.active{display:block;}

    .bottomNav{
      position:fixed;
      left:0; right:0; bottom:0;
      height:var(--navH);
      padding:10px 10px calc(10px + env(safe-area-inset-bottom));
      border-top:1px solid var(--line);
      background:#2a0b14;
      background:color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter:blur(10px) saturate(160%);
      display:flex;
      gap:10px;
      z-index:30;
      overflow-x:auto;
    }

    .tab{
      min-width:120px;
      flex:1;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--soft);
      color:var(--fg);
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      padding:0 10px;
      text-align:center;
    }

    .tab.active{
      background:linear-gradient(135deg, rgba(185,28,60,.9), rgba(239,71,111,.22));
      border-color:rgba(239,71,111,.4);
    }

    .tableWrap{
      overflow:auto;
      border-radius:14px;
      border:1px solid var(--line);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:760px;
      background:transparent;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid var(--line);
      font-size:13px;
      vertical-align:top;
    }

    th{
      color:var(--muted);
      text-align:left;
      background:#441522;
      position:sticky;
      top:0;
      z-index:1;
    }

    tr:last-child td{border-bottom:0;}

    .note{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .warnBox{
      border:1px solid color-mix(in srgb, var(--danger) 40%, var(--line));
      background:color-mix(in srgb, var(--danger) 10%, var(--card));
      padding:10px 12px;
      border-radius:12px;
      color:#fff2f2;
      font-size:12px;
      margin-top:10px;
    }

    .okBox{
      border:1px solid color-mix(in srgb, var(--good) 40%, var(--line));
      background:color-mix(in srgb, var(--good) 10%, var(--card));
      padding:10px 12px;
      border-radius:12px;
      color:#f0fff4;
      font-size:12px;
      margin-top:10px;
    }

    .infoBox{
      border:1px solid color-mix(in srgb, var(--accent2) 40%, var(--line));
      background:color-mix(in srgb, var(--accent2) 8%, var(--card));
      padding:10px 12px;
      border-radius:12px;
      color:#fff3f6;
      font-size:12px;
      margin-top:10px;
    }

    .sectionTitle{
      margin:0 0 10px;
      font-size:14px;
      color:var(--muted);
    }

    .hidden{ display:none !important; }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }

    .toolbar .left, .toolbar .right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .searchInput{ min-width:220px; }

    .muted{
      color:var(--muted);
      font-size:12px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:#fff1f4;
      border:1px solid rgba(239,71,111,.28);
      background:rgba(185,28,60,.18);
      border-radius:999px;
      padding:5px 9px;
    }

    .actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .alertGrid{
      display:grid;
      gap:10px;
    }

    @media(min-width:760px){
      .alertGrid.two{grid-template-columns:1fr 1fr;}
    }

    .alertItem{
      border:1px solid rgba(239,71,111,.28);
      background:rgba(185,28,60,.10);
      border-radius:14px;
      padding:12px;
    }

    .alertUrgent{
      border:1px solid rgba(245,158,11,.45);
      background:linear-gradient(135deg, rgba(245,158,11,.18), rgba(185,28,60,.14));
      box-shadow:0 0 0 1px rgba(245,158,11,.12) inset;
    }

    .alertTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:6px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .badge.today{ background:#dc2626; color:#fff; }
    .badge.tomorrow{ background:#f59e0b; color:#111827; }
    .badge.soon{ background:#b91c3c; color:#fff; }
    .badge.later{ background:#4a1423; color:#fff; border:1px solid var(--line); }

    .rightText{text-align:right;}
    .mono{font-variant-numeric:tabular-nums;}

    @media(max-width:640px){
      table{ min-width:680px; }
      .tab{ min-width:110px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title">
      <h1>Gastos</h1>
      <div class="sub">Control personal • Offline • Alertas de pago</div>
    </div>
    <div class="topRight">
      <div class="versionBadge" id="versionText">v4.3</div>
      <div class="pill" id="fechaHoy">—</div>
    </div>
  </header>

  <main>
    <section id="vTarjetas" class="view active"></section>
    <section id="vIngresos" class="view"></section>
    <section id="vEgresos" class="view"></section>
    <section id="vResumen" class="view"></section>
  </main>

  <nav class="bottomNav">
    <div class="tab active" data-tab="Tarjetas">▦ Tarjetas</div>
    <div class="tab" data-tab="Ingresos">💵 Ingresos</div>
    <div class="tab" data-tab="Egresos">－ Egresos</div>
    <div class="tab" data-tab="Resumen">☰ Resumen</div>
  </nav>

<script>
  const APP_VERSION = "v4.3";
  const KEY = "app_gastos_final_v43";
  const LEGACY_KEYS = ["app_gastos_final_v42","app_gastos_final_v41","app_gastos_final_v4","app_gastos_final_v3"];

  const emptyState = {
    cards: [],
    incomes: [],
    expenses: []
  };

  function structuredCloneSafe(obj){
    return JSON.parse(JSON.stringify(obj));
  }

  function pad2(n){
    return String(n).padStart(2,"0");
  }

  function todayISO(){
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  function uid(){
    return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random();
  }

  function validISO(v){
    return /^\d{4}-\d{2}-\d{2}$/.test(String(v || ""));
  }

  function monthKey(iso){
    return String(iso || "").slice(0,7);
  }

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function normalizeText(v){
    return String(v ?? "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim();
  }

  function includesText(...values){
    return normalizeText(values.join(" "));
  }

  function parseMoney(v){
    let s = String(v ?? "").trim();
    if(!s) return NaN;

    s = s.replace(/\s+/g, "");
    s = s.replace(/[^\d,.-]/g, "");

    const hasComma = s.includes(",");
    const hasDot = s.includes(".");

    if(hasComma && hasDot){
      if(s.lastIndexOf(",") > s.lastIndexOf(".")){
        s = s.replace(/\./g, "");
        s = s.replace(",", ".");
      } else {
        s = s.replace(/,/g, "");
      }
    } else if(hasComma && !hasDot){
      s = s.replace(",", ".");
    }

    s = s.replace(/(?!^)-/g, "");

    const x = Number(s);
    return Number.isFinite(x) ? x : NaN;
  }

  function fmt(n){
    return new Intl.NumberFormat("es-MX", {
      style:"currency",
      currency:"MXN"
    }).format(Number(n || 0));
  }

  function isoFromDate(d){
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  function clampDay(year, monthIndex, day){
    const last = new Date(year, monthIndex + 1, 0).getDate();
    return Math.min(day, last);
  }

  function normalizeState(raw){
    const base = raw || {};
    const state = {
      cards: Array.isArray(base.cards) ? base.cards : [],
      incomes: Array.isArray(base.incomes) ? base.incomes : [],
      expenses: Array.isArray(base.expenses) ? base.expenses : []
    };

    state.cards = state.cards.map(c => ({
      id: c.id || uid(),
      name: String(c.name || "").trim(),
      cutDay: Number(c.cutDay || 1),
      payDay: Number(c.payDay || 1),
      creditLimit: Number(c.creditLimit || 0)
    }));

    state.incomes = state.incomes.map(i => ({
      id: i.id || uid(),
      type: String(i.type || "Otro"),
      fortnight: i.fortnight === "Q2" ? "Q2" : "Q1",
      amount: Number(i.amount || 0),
      date: validISO(i.date) ? i.date : todayISO(),
      note: String(i.note || "")
    }));

    state.expenses = state.expenses.map(e => {
      let mode = e.mode;
      if(!mode){
        mode = e.category === "Pago de tarjeta de crédito" ? "payment" : "purchase";
      }
      return {
        id: e.id || uid(),
        mode,
        category: String(e.category || (mode === "payment" ? "Pago de tarjeta de crédito" : "Otro")),
        cardId: String(e.cardId || ""),
        amount: Number(e.amount || 0),
        date: validISO(e.date) ? e.date : todayISO(),
        note: String(e.note || ""),
        sourceIncomeType: String(e.sourceIncomeType || "")
      };
    });

    return state;
  }

  function loadState(){
    const current = localStorage.getItem(KEY);
    if(current){
      try{
        return normalizeState(JSON.parse(current));
      }catch{
        return structuredCloneSafe(emptyState);
      }
    }

    for(const oldKey of LEGACY_KEYS){
      const legacy = localStorage.getItem(oldKey);
      if(legacy){
        try{
          const normalized = normalizeState(JSON.parse(legacy));
          localStorage.setItem(KEY, JSON.stringify(normalized));
          return normalized;
        }catch{}
      }
    }

    return structuredCloneSafe(emptyState);
  }

  const state = loadState();

  const INCOME_TYPES = [
    "Nómina",
    "Préstamo",
    "Venta",
    "Transferencia",
    "Devolución",
    "Apoyo familiar",
    "Ingreso extra",
    "Otro"
  ];

  const PURCHASE_CATEGORIES = [
    "Comida",
    "Transporte",
    "Gasolina",
    "Super",
    "Servicios",
    "Salud",
    "Escuela",
    "Viajes",
    "Ahorro",
    "Gastos generales",
    "Entretenimiento",
    "Compras",
    "Otro"
  ];

  const ui = {
    activeTab: "Tarjetas",
    incomeSearch: "",
    expenseSearch: "",
    editingCardId: null,
    editingIncomeId: null,
    editingExpenseId: null
  };

  const TAB_TO_VIEW = {
    Tarjetas: "vTarjetas",
    Ingresos: "vIngresos",
    Egresos: "vEgresos",
    Resumen: "vResumen"
  };

  function save(){
    localStorage.setItem(KEY, JSON.stringify(state));
  }

  function cardName(id){
    return state.cards.find(c=>c.id===id)?.name || "—";
  }

  function sumNominaIncomesForMonth(month, ignoreIncomeId = null){
    return state.incomes
      .filter(i =>
        monthKey(i.date) === month &&
        i.type === "Nómina" &&
        i.id !== ignoreIncomeId
      )
      .reduce((s,i)=>s + Number(i.amount || 0), 0);
  }

  function sumNominaPaymentsForMonth(month, ignoreExpenseId = null){
    return state.expenses
      .filter(e =>
        monthKey(e.date) === month &&
        e.mode === "payment" &&
        e.sourceIncomeType === "Nómina" &&
        e.id !== ignoreExpenseId
      )
      .reduce((s,e)=>s + Number(e.amount || 0), 0);
  }

  function getNominaDisponibleMonth(selectedMonth, ignoreExpenseId = null){
    const total = sumNominaIncomesForMonth(selectedMonth);
    const used = sumNominaPaymentsForMonth(selectedMonth, ignoreExpenseId);
    return Math.max(0, total - used);
  }

  function wouldIncomeChangeBreakNominaRules({ originalIncomeId = null, newType, newDate, newAmount }){
    const original = originalIncomeId
      ? state.incomes.find(i => i.id === originalIncomeId)
      : null;

    const monthsToCheck = new Set();
    if(original && original.type === "Nómina") monthsToCheck.add(monthKey(original.date));
    if(newType === "Nómina") monthsToCheck.add(monthKey(newDate));

    for(const month of monthsToCheck){
      const baseNomina = sumNominaIncomesForMonth(month, originalIncomeId);

      let simulatedNomina = baseNomina;
      if(newType === "Nómina" && monthKey(newDate) === month){
        simulatedNomina += Number(newAmount || 0);
      }

      const usedNomina = sumNominaPaymentsForMonth(month);
      if(usedNomina > simulatedNomina){
        return true;
      }
    }

    return false;
  }

  function setTab(name){
    ui.activeTab = name;
    document.querySelectorAll(".tab").forEach(t=>{
      t.classList.toggle("active", t.dataset.tab === name);
    });
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.getElementById(TAB_TO_VIEW[name]).classList.add("active");
    render();
  }

  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click", ()=> setTab(tab.dataset.tab));
  });

  function getCurrentCycle(card){
    const now = new Date();
    const y = now.getFullYear();
    const m = now.getMonth();
    const today = now.getDate();
    const cutDay = Number(card.cutDay);

    let start, end;

    if(today > cutDay){
      start = new Date(y, m, clampDay(y, m, cutDay) + 1);
      const nextMonth = new Date(y, m + 1, 1);
      end = new Date(
        nextMonth.getFullYear(),
        nextMonth.getMonth(),
        clampDay(nextMonth.getFullYear(), nextMonth.getMonth(), cutDay)
      );
    } else {
      const prevMonth = new Date(y, m - 1, 1);
      start = new Date(
        prevMonth.getFullYear(),
        prevMonth.getMonth(),
        clampDay(prevMonth.getFullYear(), prevMonth.getMonth(), cutDay) + 1
      );
      end = new Date(y, m, clampDay(y, m, cutDay));
    }

    return {
      startISO: isoFromDate(start),
      endISO: isoFromDate(end)
    };
  }

  function isDateBetween(iso, startISO, endISO){
    return iso >= startISO && iso <= endISO;
  }

  function getCardPurchases(cardId){
    return state.expenses
      .filter(e => e.cardId === cardId && e.mode === "purchase")
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getCardPayments(cardId){
    return state.expenses
      .filter(e => e.cardId === cardId && e.mode === "payment")
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getCardDebt(cardId){
    return Math.max(0, getCardPurchases(cardId) - getCardPayments(cardId));
  }

  function getCardAvailable(card){
    return Math.max(0, Number(card.creditLimit||0) - getCardDebt(card.id));
  }

  function getCardCyclePurchases(card){
    const range = getCurrentCycle(card);
    return state.expenses
      .filter(e =>
        e.cardId === card.id &&
        e.mode === "purchase" &&
        isDateBetween(e.date, range.startISO, range.endISO)
      )
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getCardCyclePayments(card){
    const range = getCurrentCycle(card);
    return state.expenses
      .filter(e =>
        e.cardId === card.id &&
        e.mode === "payment" &&
        isDateBetween(e.date, range.startISO, range.endISO)
      )
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function cardTotals(cardId){
    const card = state.cards.find(c=>c.id===cardId);
    const totalPurchases = getCardPurchases(cardId);
    const totalPayments = getCardPayments(cardId);
    const currentDebt = getCardDebt(cardId);

    let cycleTotal = 0;
    let cycleRange = null;

    if(card){
      cycleRange = getCurrentCycle(card);
      cycleTotal = getCardCyclePurchases(card) - getCardCyclePayments(card);
      if(cycleTotal < 0) cycleTotal = 0;
    }

    return {
      totalPurchases,
      totalPayments,
      currentDebt,
      cycleTotal,
      cycleRange,
      available: card ? getCardAvailable(card) : 0
    };
  }

  function getIncomeTotalByMonth(selectedMonth){
    return state.incomes
      .filter(i=>monthKey(i.date) === selectedMonth)
      .reduce((s,i)=>s+Number(i.amount||0),0);
  }

  function getIncomeByTypeMonth(type, selectedMonth){
    return state.incomes
      .filter(i=>monthKey(i.date) === selectedMonth && i.type === type)
      .reduce((s,i)=>s+Number(i.amount||0),0);
  }

    return getIncomeByTypeMonth("Nómina", selectedMonth);

  function getCardPaymentsFromNomina(selectedMonth){
    return state.expenses
      .filter(e =>
        monthKey(e.date) === selectedMonth &&
        e.mode === "payment" &&
        e.sourceIncomeType === "Nómina"
      )
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getNextPaymentDate(card){
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const y = today.getFullYear();
    const m = today.getMonth();
    const payDay = Number(card.payDay || 1);

    let target;
    const dayThisMonth = clampDay(y, m, payDay);

    if(today.getDate() <= dayThisMonth){
      target = new Date(y, m, dayThisMonth);
    } else {
      const nextMonth = new Date(y, m + 1, 1);
      target = new Date(
        nextMonth.getFullYear(),
        nextMonth.getMonth(),
        clampDay(nextMonth.getFullYear(), nextMonth.getMonth(), payDay)
      );
    }

    return target;
  }

  function daysUntil(dateObj){
    const today = new Date();
    const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const target = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
    return Math.round((target - start) / 86400000);
  }

  function paymentBadgeClass(days){
    if(days <= 0) return "today";
    if(days === 1) return "tomorrow";
    if(days <= 7) return "soon";
    return "later";
  }

  function paymentBadgeText(days){
    if(days <= 0) return "Hoy";
    if(days === 1) return "Mañana";
    return `En ${days} días`;
  }

  function getUpcomingPayments(){
    return state.cards
      .map(card=>{
        const nextDate = getNextPaymentDate(card);
        const debt = getCardDebt(card.id);
        const cycle = cardTotals(card.id).cycleTotal;
        return {
          card,
          debt,
          cycle,
          nextDate,
          nextDateISO: isoFromDate(nextDate),
          daysLeft: daysUntil(nextDate)
        };
      })
      .filter(x=>x.debt > 0)
      .sort((a,b)=>{
        if(a.daysLeft !== b.daysLeft) return a.daysLeft - b.daysLeft;
        return b.debt - a.debt;
      });
  }

  function getUrgentPayments(){
    return getUpcomingPayments().filter(x => x.daysLeft <= 7);
  }

  function exportBackup(){
    const payload = {
      app: "Gastos",
      version: APP_VERSION,
      exportedAt: new Date().toISOString(),
      data: state
    };

    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `gastos_respaldo_${todayISO()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importBackup(file){
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        const imported = normalizeState(parsed.data || parsed);

        state.cards = imported.cards;
        state.incomes = imported.incomes;
        state.expenses = imported.expenses;

        ui.editingCardId = null;
        ui.editingIncomeId = null;
        ui.editingExpenseId = null;

        save();
        render();
        alert("Respaldo importado correctamente.");
      }catch{
        alert("El archivo no es un respaldo válido.");
      }
    };
    reader.readAsText(file);
  }

    const selectedMonth = document.getElementById("egMonth")?.value || monthKey(todayISO());
    const selectedCard = document.getElementById("egFilterCard")?.value || "__all__";
    const selectedType = document.getElementById("egFilterType")?.value || "__all__";
    const search = normalizeText(ui.expenseSearch);
    const editingExpense = state.expenses.find(e => e.id === ui.editingExpenseId) || null;

    const filtered = state.expenses.filter(e=>{
      const okMonth = monthKey(e.date) === selectedMonth;
      const okCard = selectedCard === "__all__" || e.cardId === selectedCard;
      const okType = selectedType === "__all__" || e.mode === selectedType;
      const hay = includesText(e.date, cardName(e.cardId), e.mode, e.category, e.note, e.sourceIncomeType, e.amount);
      const okSearch = !search || hay.includes(search);
      return okMonth && okCard && okType && okSearch;
    });

    const totalMonth = state.expenses
      .filter(e=>monthKey(e.date) === selectedMonth)
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalFiltered = filtered.reduce((s,e)=>s+Number(e.amount||0),0);

    const totalPurchasesMonth = state.expenses
      .filter(e=>monthKey(e.date) === selectedMonth && e.mode === "purchase")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalPaymentsMonth = state.expenses
      .filter(e=>monthKey(e.date) === selectedMonth && e.mode === "payment")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    el.innerHTML = `
      <div class="card">
        <h3 class="sectionTitle">${editingExpense ? "Editar egreso" : "Registrar egreso"}</h3>
        <div class="note">Está separado en dos modos: <b>Compra con tarjeta</b> y <b>Pago a tarjeta</b>.</div>

        ${state.cards.length ? "" : `<div class="warnBox">Primero agrega al menos una tarjeta en la pestaña Tarjetas.</div>`}

        <div style="height:10px"></div>

        <div class="row two">
          <div>
            <label>Tipo de egreso</label>
            <select id="eMode">
              <option value="purchase" ${editingExpense?.mode !== "payment" ? "selected" : ""}>Compra con tarjeta</option>
              <option value="payment" ${editingExpense?.mode === "payment" ? "selected" : ""}>Pago a tarjeta</option>
            </select>
          </div>
          <div>
            <label>Tarjeta</label>
            <select id="eCard">
              ${state.cards.length
                ? state.cards.map(c=>`<option value="${c.id}" ${editingExpense?.cardId===c.id?"selected":""}>${esc(c.name)}</option>`).join("")
                : `<option value="">Primero agrega una tarjeta</option>`
              }
            </select>
          </div>
        </div>

        <div style="height:10px"></div>

        <div id="purchaseFields">
          <div class="row three">
            <div>
              <label>Categoría de compra</label>
              <select id="eCategory">
                ${PURCHASE_CATEGORIES.map(c=>`<option ${editingExpense?.mode==="purchase" && editingExpense?.category===c ? "selected":""}>${c}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>Fecha de compra</label>
              <input id="eDatePurchase" type="date" value="${editingExpense?.mode==="purchase" ? editingExpense.date : todayISO()}">
            </div>
            <div>
              <label>Monto de compra</label>
              <input id="eAmountPurchase" inputmode="decimal" placeholder="Ej. 450.75" value="${editingExpense?.mode==="purchase" ? esc(String(editingExpense.amount)) : ""}">
            </div>
          </div>

          <div style="height:10px"></div>

          <div class="row two">
            <div>
              <label>Nota (opcional)</label>
              <input id="eNotePurchase" placeholder="Ej. súper, gasolina, comida, etc." value="${editingExpense?.mode==="purchase" ? esc(editingExpense.note || "") : ""}">
            </div>
            <div>
              <label>Información</label>
              <div class="okBox">Las compras aumentan la deuda de la tarjeta y reducen el saldo disponible.</div>
            </div>
          </div>
        </div>

        <div id="paymentFields" class="hidden">
          <div class="row three">
            <div>
              <label>Fecha de pago</label>
              <input id="eDatePayment" type="date" value="${editingExpense?.mode==="payment" ? editingExpense.date : todayISO()}">
            </div>
            <div>
              <label>Monto de pago</label>
              <input id="eAmountPayment" inputmode="decimal" placeholder="Ej. 1200" value="${editingExpense?.mode==="payment" ? esc(String(editingExpense.amount)) : ""}">
            </div>
            <div>
              <label>Origen del dinero</label>
              <select id="eSourceIncomeType">
                <option value="">No aplica</option>
                ${INCOME_TYPES.map(t=>`<option ${editingExpense?.mode==="payment" && editingExpense?.sourceIncomeType===t?"selected":""}>${t}</option>`).join("")}
              </select>
            </div>
          </div>

          <div style="height:10px"></div>

          <div class="row two">
            <div>
              <label>Nota (opcional)</label>
              <input id="eNotePayment" placeholder="Ej. pago mínimo, pago total, abono, etc." value="${editingExpense?.mode==="payment" ? esc(editingExpense.note || "") : ""}">
            </div>
            <div>
              <label>Información</label>
              <div class="okBox">Los pagos reducen la deuda de la tarjeta. Si eliges origen <b>Nómina</b>, también se descuenta de la nómina disponible del mes.</div>
            </div>
          </div>
        </div>

        <div class="btns">
          <button id="btnSaveExpense">${editingExpense ? "Actualizar egreso" : "Guardar egreso"}</button>
          <button class="secondary" id="btnClearExpense">Limpiar</button>
          ${editingExpense ? `<button class="warn" id="btnCancelEditExpense">Cancelar edición</button>` : ""}
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Filtro de egresos</h3>
        <div class="row four">
          <div>
            <label>Mes</label>
            <input type="month" id="egMonth" value="${selectedMonth}">
          </div>
          <div>
            <label>Tarjeta</label>
            <select id="egFilterCard">
              <option value="__all__">Todas</option>
              ${state.cards.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>Tipo de egreso</label>
            <select id="egFilterType">
              <option value="__all__">Todos</option>
              <option value="purchase">Compras con tarjeta</option>
              <option value="payment">Pagos a tarjeta</option>
            </select>
          </div>
          <div>
            <label>Buscar</label>
            <input id="egSearch" class="searchInput" placeholder="Buscar por tarjeta, nota, categoría..." value="${esc(ui.expenseSearch)}">
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="kpi four">
          <div class="k">
            <div class="t">Compras del mes</div>
            <div class="v">${fmt(totalPurchasesMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Pagos del mes</div>
            <div class="v">${fmt(totalPaymentsMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Total egresos del mes</div>
            <div class="v">${fmt(totalMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Total filtrado</div>
            <div class="v">${fmt(totalFiltered)}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Lista de egresos</h3>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Fecha</th>
                <th>Tarjeta</th>
                <th>Tipo</th>
                <th>Categoría / Origen</th>
                <th>Monto</th>
                <th>Nota</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              ${filtered.length ? filtered
                .slice()
                .sort((a,b)=>a.date < b.date ? 1 : -1)
                .map(e=>`
                  <tr>
                    <td>${e.date}</td>
                    <td>${esc(cardName(e.cardId))}</td>
                    <td>${e.mode === "purchase" ? "Compra" : "Pago a tarjeta"}</td>
                    <td>${e.mode === "purchase" ? esc(e.category) : esc(e.sourceIncomeType || "—")}</td>
                    <td>${fmt(e.amount)}</td>
                    <td>${esc(e.note || "")}</td>
                    <td>
                      <div class="actions">
                        <button class="secondary small" data-editexpense="${e.id}">Editar</button>
                        <button class="danger small" data-delexpense="${e.id}">Eliminar</button>
                      </div>
                    </td>
                  </tr>
                `).join("")
                : `<tr><td colspan="7" class="note">No hay egresos para ese filtro.</td></tr>`
              }
            </tbody>
          </table>
        </div>
      </div>
    `;

    const modeSelect = el.querySelector("#eMode");
    const purchaseFields = el.querySelector("#purchaseFields");
    const paymentFields = el.querySelector("#paymentFields");

    function syncExpenseModeUI(){
      const mode = modeSelect.value;
      purchaseFields.classList.toggle("hidden", mode !== "purchase");
      paymentFields.classList.toggle("hidden", mode !== "payment");
    }

    modeSelect.onchange = syncExpenseModeUI;
    syncExpenseModeUI();

    el.querySelector("#egFilterCard").value = selectedCard;
    el.querySelector("#egFilterType").value = selectedType;

    el.querySelector("#btnSaveExpense").onclick = ()=>{
      if(!state.cards.length){
        alert("Primero agrega una tarjeta.");
        setTab("Tarjetas");
        return;
      }

      const mode = el.querySelector("#eMode").value;
      const cardId = el.querySelector("#eCard").value;
      const card = state.cards.find(c=>c.id === cardId);

      if(!cardId) return alert("Selecciona una tarjeta.");
      if(!card) return alert("Tarjeta no encontrada.");

      if(mode === "purchase"){
        const category = el.querySelector("#eCategory").value;
        const date = el.querySelector("#eDatePurchase").value;
        const amount = parseMoney(el.querySelector("#eAmountPurchase").value);
        const note = el.querySelector("#eNotePurchase").value.trim();

        if(!date) return alert("Selecciona una fecha de compra.");
        if(!Number.isFinite(amount) || amount <= 0) return alert("Monto inválido.");

        const currentPurchaseTotalExcludingEdited =
          state.expenses
            .filter(e => e.cardId === cardId && e.mode === "purchase" && e.id !== ui.editingExpenseId)
            .reduce((s,e)=>s+Number(e.amount||0),0);

        const currentPaymentTotalExcludingEdited =
          state.expenses
            .filter(e => e.cardId === cardId && e.mode === "payment" && e.id !== ui.editingExpenseId)
            .reduce((s,e)=>s+Number(e.amount||0),0);

        const simulatedDebt = Math.max(0, currentPurchaseTotalExcludingEdited + amount - currentPaymentTotalExcludingEdited);

        if(simulatedDebt > Number(card.creditLimit || 0)){
          return alert("Esa compra supera el saldo disponible actual de la tarjeta.");
        }

        if(ui.editingExpenseId){
          const idx = state.expenses.findIndex(x=>x.id===ui.editingExpenseId);
          if(idx >= 0){
            state.expenses[idx] = {
              ...state.expenses[idx],
              mode: "purchase",
              category,
              cardId,
              date,
              amount,
              note,
              sourceIncomeType: ""
            };
          }
          ui.editingExpenseId = null;
        } else {
          state.expenses.push({
            id: uid(),
            mode: "purchase",
            category,
            cardId,
            date,
            amount,
            note,
            sourceIncomeType: ""
          });
        }
      } else {
        const date = el.querySelector("#eDatePayment").value;
        const amount = parseMoney(el.querySelector("#eAmountPayment").value);
        const note = el.querySelector("#eNotePayment").value.trim();
        const sourceIncomeType = el.querySelector("#eSourceIncomeType").value || "";

        if(!date) return alert("Selecciona una fecha de pago.");
        if(!Number.isFinite(amount) || amount <= 0) return alert("Monto inválido.");

        const simulatedPurchases = state.expenses
          .filter(e => e.cardId === cardId && e.mode === "purchase" && e.id !== ui.editingExpenseId)
          .reduce((s,e)=>s+Number(e.amount||0),0);

        const simulatedPayments = state.expenses
          .filter(e => e.cardId === cardId && e.mode === "payment" && e.id !== ui.editingExpenseId)
          .reduce((s,e)=>s+Number(e.amount||0),0);

        const simulatedDebt = Math.max(0, simulatedPurchases - simulatedPayments);

        if(amount > simulatedDebt){
          return alert("El pago no puede ser mayor que la deuda actual de la tarjeta.");
        }

        if(sourceIncomeType === "Nómina"){
          const selectedM = monthKey(date);
          const nominaDisponible = getNominaDisponibleMonth(selectedM, ui.editingExpenseId);

          if(amount > nominaDisponible){
            return alert("Ese pago supera la nómina disponible del mes.");
          }
        }

        if(ui.editingExpenseId){
          const idx = state.expenses.findIndex(x=>x.id===ui.editingExpenseId);
          if(idx >= 0){
            state.expenses[idx] = {
              ...state.expenses[idx],
              mode: "payment",
              category: "Pago de tarjeta de crédito",
              cardId,
              date,
              amount,
              note,
              sourceIncomeType
            };
          }
          ui.editingExpenseId = null;
        } else {
          state.expenses.push({
            id: uid(),
            mode: "payment",
            category: "Pago de tarjeta de crédito",
            cardId,
            date,
            amount,
            note,
            sourceIncomeType
          });
        }
      }

      render();
      setTab("Egresos");
    };

    el.querySelector("#btnClearExpense").onclick = ()=>{
      ui.editingExpenseId = null;
      render();
    };

    if(el.querySelector("#btnCancelEditExpense")){
      el.querySelector("#btnCancelEditExpense").onclick = ()=>{
        ui.editingExpenseId = null;
        render();
      };
    }

    el.querySelector("#egMonth").onchange = render;
    el.querySelector("#egFilterCard").onchange = render;
    el.querySelector("#egFilterType").onchange = render;
    el.querySelector("#egSearch").oninput = (ev)=>{
      ui.expenseSearch = ev.target.value;
      render();
    };

    el.querySelectorAll("[data-editexpense]").forEach(btn=>{
      btn.onclick = ()=>{
        ui.editingExpenseId = btn.getAttribute("data-editexpense");
        render();
        window.scrollTo({top:0, behavior:"smooth"});
      };
    });

    el.querySelectorAll("[data-delexpense]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute("data-delexpense");

        if(confirm("¿Eliminar este egreso?")){
          state.expenses = state.expenses.filter(x=>x.id !== id);
          if(ui.editingExpenseId === id) ui.editingExpenseId = null;
          render();
          setTab("Egresos");
        }
      };
    });
  }

  function renderResumen(){
    const el = document.getElementById("vResumen");
    const selectedMonth = document.getElementById("rMonth")?.value || monthKey(todayISO());

    const incomesMonth = state.incomes.filter(i=>monthKey(i.date) === selectedMonth);
    const expensesMonth = state.expenses.filter(e=>monthKey(e.date) === selectedMonth);
    const upcoming = getUpcomingPayments();
    const urgent = getUrgentPayments();

    const totalIncome = incomesMonth.reduce((s,i)=>s+Number(i.amount||0),0);

    const totalPurchasesMonth = expensesMonth
      .filter(e=>e.mode === "purchase")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalPaymentsMonth = expensesMonth
      .filter(e=>e.mode === "payment")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalQ1 = incomesMonth
      .filter(i=>i.fortnight==="Q1")
      .reduce((s,i)=>s+Number(i.amount||0),0);

    const totalQ2 = incomesMonth
      .filter(i=>i.fortnight==="Q2")
      .reduce((s,i)=>s+Number(i.amount||0),0);

    const totalNomina = getNominaTotalMonth(selectedMonth);
    const nominaUsada = getCardPaymentsFromNomina(selectedMonth);
    const nominaDisponible = getNominaDisponibleMonth(selectedMonth);

    const totalDebtAllCards = state.cards.reduce((s,card)=>s + getCardDebt(card.id), 0);
    const totalAvailableAllCards = state.cards.reduce((s,card)=>s + getCardAvailable(card), 0);

    const cashFlowBalance = totalIncome - totalPaymentsMonth;

    const expenseByCategory = {};
    for(const c of PURCHASE_CATEGORIES) expenseByCategory[c] = 0;

    expensesMonth.filter(e=>e.mode === "purchase").forEach(e=>{
      expenseByCategory[e.category] = (expenseByCategory[e.category] || 0) + Number(e.amount||0);
    });

    el.innerHTML = `
      <div class="card">
        <h3 class="sectionTitle">Pagos urgentes esta semana</h3>
        <div class="note">Aquí se concentran primero los pagos más cercanos para que no se te pasen.</div>
        <div style="height:10px"></div>
        ${renderUrgentPaymentsBlock(urgent)}
      </div>

      <div class="card">
        <h3 class="sectionTitle">Alertas de pago</h3>
        <div class="note">Estas alertas se calculan con la fecha de pago de cada tarjeta y tu deuda actual.</div>
        <div style="height:10px"></div>
        ${renderUpcomingPaymentsBlock(upcoming.slice(0, 6))}
      </div>

      <div class="card">
        <h3 class="sectionTitle">Resumen mensual</h3>

        <div class="row two">
          <div>
            <label>Mes</label>
            <input type="month" id="rMonth" value="${selectedMonth}">
          </div>
          <div>
            <label>Ir a sección</label>
            <select id="rJump">
              <option value="Resumen">Resumen</option>
              <option value="Tarjetas">Tarjetas</option>
              <option value="Ingresos">Ingresos</option>
              <option value="Egresos">Egresos</option>
            </select>
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="kpi five">
          <div class="k">
            <div class="t">Ingresos Q1</div>
            <div class="v">${fmt(totalQ1)}</div>
          </div>
          <div class="k">
            <div class="t">Ingresos Q2</div>
            <div class="v">${fmt(totalQ2)}</div>
          </div>
          <div class="k">
            <div class="t">Total percibido</div>
            <div class="v">${fmt(totalIncome)}</div>
          </div>
          <div class="k">
            <div class="t">Compras con tarjeta</div>
            <div class="v">${fmt(totalPurchasesMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Pagos a tarjeta del mes</div>
            <div class="v">${fmt(totalPaymentsMonth)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi four">
          <div class="k">
            <div class="t">Nómina del mes</div>
            <div class="v">${fmt(totalNomina)}</div>
          </div>
          <div class="k">
            <div class="t">Nómina usada en pagos</div>
            <div class="v">${fmt(nominaUsada)}</div>
          </div>
          <div class="k">
            <div class="t">Nómina disponible</div>
            <div class="v">${fmt(nominaDisponible)}</div>
          </div>
          <div class="k ${cashFlowBalance < 0 ? "negative" : "positive"}">
            <div class="t">Balance de flujo del mes</div>
            <div class="v">${fmt(cashFlowBalance)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi two">
          <div class="k">
            <div class="t">Deuda total en tarjetas</div>
            <div class="v">${fmt(totalDebtAllCards)}</div>
          </div>
          <div class="k">
            <div class="t">Disponible total en tarjetas</div>
            <div class="v">${fmt(totalAvailableAllCards)}</div>
          </div>
        </div>

        <div class="infoBox">
          <b>Nota del resumen:</b> el <b>balance de flujo del mes</b> se calcula con ingresos menos <b>pagos a tarjeta</b>. 
          Las <b>compras con tarjeta</b> se muestran aparte para no contar doble el mismo dinero.
        </div>

        ${cashFlowBalance < 0
          ? `<div class="warnBox">Tu balance de flujo del mes está en negativo. Eso significa que tus pagos a tarjeta del mes superan tus ingresos registrados para este periodo.</div>`
          : `<div class="okBox">Tu balance de flujo del mes está en positivo. Vas bien mientras tus registros sean completos.</div>`
        }
      </div>

      <div class="card">
        <h3 class="sectionTitle">Compras por categoría</h3>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Categoría</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody>
              ${PURCHASE_CATEGORIES.map(c=>`
                <tr>
                  <td>${esc(c)}</td>
                  <td>${fmt(expenseByCategory[c] || 0)}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Resumen por tarjeta</h3>
        ${state.cards.length ? `
          <div class="tableWrap">
            <table>
              <thead>
                <tr>
                  <th>Tarjeta</th>
                  <th>Saldo total</th>
                  <th>Total comprado</th>
                  <th>Total pagado</th>
                  <th>Deuda actual</th>
                  <th>Disponible</th>
                  <th>Monto del ciclo</th>
                  <th>Periodo del ciclo</th>
                </tr>
              </thead>
              <tbody>
                ${state.cards.map(card=>{
                  const t = cardTotals(card.id);
                  return `
                    <tr>
                      <td>${esc(card.name)}</td>
                      <td>${fmt(card.creditLimit)}</td>
                      <td>${fmt(t.totalPurchases)}</td>
                      <td>${fmt(t.totalPayments)}</td>
                      <td>${fmt(t.currentDebt)}</td>
                      <td>${fmt(t.available)}</td>
                      <td>${fmt(t.cycleTotal)}</td>
                      <td>${t.cycleRange ? `${t.cycleRange.startISO} a ${t.cycleRange.endISO}` : "—"}</td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        ` : `<div class="warnBox">No hay tarjetas registradas todavía.</div>`}
      </div>
    `;

    el.querySelector("#rMonth").onchange = render;
    el.querySelector("#rJump").onchange = (ev)=> setTab(ev.target.value);
  }

  document.getElementById("fechaHoy").textContent =
    new Date().toLocaleDateString("es-MX", { dateStyle:"full" });

  render();
</script>
</body>
</html>
