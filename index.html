<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gastos</title>
  <meta name="theme-color" content="#0b1220" />

  <style>
    :root{
      --bg:#0b1220;
      --card:#121a2c;
      --fg:#e8f0ff;
      --muted:#93a4c7;
      --line:#1f2a40;
      --accent:#3b82f6;
      --good:#22c55e;
      --danger:#ef4444;
      --soft:#1b2740;
      --r:16px;
      --navH:78px;
    }

    *{ box-sizing:border-box; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; }
    body{
      margin:0;
      color:var(--fg);
      background:
        radial-gradient(900px 500px at 15% -10%, rgba(59,130,246,.18), transparent 55%),
        radial-gradient(900px 500px at 90% 0%, rgba(34,197,94,.10), transparent 55%),
        linear-gradient(180deg, var(--bg), #0e1628);
    }

    header{
      position: sticky; top:0; z-index: 10;
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter: blur(10px) saturate(160%);
      border-bottom: 1px solid var(--line);
      padding: 12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .title{display:flex; flex-direction:column; gap:2px;}
    h1{margin:0; font-size:18px; letter-spacing:.2px;}
    .sub{font-size:12px; color:var(--muted);}
    .pill{
      font-size:12px; color:var(--muted);
      border:1px solid var(--line);
      padding:6px 10px; border-radius:999px;
      white-space:nowrap;
    }

    main{
      padding: 14px 14px calc(var(--navH) + 18px);
      max-width: 980px;
      margin: 0 auto;
    }

    .card{
      background: color-mix(in srgb, var(--card) 92%, rgba(59,130,246,.06));
      border:1px solid var(--line);
      border-radius: var(--r);
      padding: 14px;
      box-shadow: 0 12px 28px rgba(0,0,0,.25);
      margin-bottom: 12px;
    }

    .row{ display:grid; gap:10px; }
    @media(min-width:560px){ .row.two{ grid-template-columns:1fr 1fr; } }

    label{ font-size:12px; color: var(--muted); display:block; margin-bottom:6px; }
    input, select, textarea{
      width:100%;
      padding:10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #0f172a;
      color: var(--fg);
      outline: none;
    }
    textarea{ min-height: 70px; resize: vertical; }

    .btns{display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;}
    button{
      border:0;
      border-radius: 12px;
      padding:10px 12px;
      font-weight: 800;
      cursor: pointer;
      color: white;
      background: var(--accent);
    }
    button.secondary{ background: var(--soft); border:1px solid var(--line); }
    button.good{ background: var(--good); }
    button.danger{ background: var(--danger); }
    button:active{ transform: translateY(1px); }

    .kpi{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .k{
      padding:12px;
      border-radius: 14px;
      border:1px solid var(--line);
      background:#0f172a;
    }
    .k .t{ font-size:12px; color:var(--muted); }
    .k .v{ font-size:18px; font-weight: 900; margin-top:6px; }

    .view{ display:none; }
    .view.active{ display:block; }

    .bottomNav{
      position: fixed;
      left:0; right:0; bottom:0;
      height: var(--navH);
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter: blur(10px) saturate(160%);
      display:flex;
      gap:10px;
      z-index: 20;
      overflow-x:auto;
    }
    .tab{
      min-width: 118px;
      flex:1;
      border:1px solid var(--line);
      border-radius: 14px;
      background: var(--soft);
      color: var(--fg);
      font-weight: 900;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }
    .tab.active{
      background: linear-gradient(135deg, rgba(59,130,246,.85), rgba(34,197,94,.18));
      border-color: color-mix(in srgb, var(--accent) 60%, var(--line));
    }

    table{ width:100%; border-collapse: collapse; overflow:hidden; border-radius: 14px; border:1px solid var(--line); }
    th,td{ padding:10px; border-bottom:1px solid var(--line); font-size:13px; }
    th{ color:var(--muted); text-align:left; background: color-mix(in srgb, var(--card) 60%, var(--line)); }
    tr:last-child td{ border-bottom:0; }

    .note{ font-size:12px; color:var(--muted); line-height:1.35; }
    .warnBox{
      border:1px solid color-mix(in srgb, var(--danger) 40%, var(--line));
      background: color-mix(in srgb, var(--danger) 10%, var(--card));
      padding:10px 12px;
      border-radius: 12px;
      color: color-mix(in srgb, var(--fg) 92%, var(--muted));
      font-size:12px;
      margin-top:10px;
    }

    /* Forzar móvil cuando está instalada (PWA) */
    body.pwa-mobile .view{ display:none; }
    body.pwa-mobile .view.active{ display:block; }
  </style>
</head>

<body>
  <header>
    <div class="title">
      <h1>Gastos</h1>
      <div class="sub">Control personal • Offline • Sin datos sensibles</div>
    </div>
    <div class="pill" id="fechaHoy">—</div>
  </header>

  <main>
    <!-- Orden de vistas: nómina, tarjetas, gastos, ahorro, resumen -->
    <section id="vNomina" class="view active"></section>
    <section id="vTarjetas" class="view"></section>
    <section id="vGastos" class="view"></section>
    <section id="vAhorro" class="view"></section>
    <section id="vResumen" class="view"></section>
  </main>

  <nav class="bottomNav">
    <div class="tab active" data-tab="Nomina">💵 Nómina</div>
    <div class="tab" data-tab="Tarjetas">▦ Tarjetas</div>
    <div class="tab" data-tab="Gastos">＋ Gastos</div>
    <div class="tab" data-tab="Ahorro">🐷 Ahorro</div>
    <div class="tab" data-tab="Resumen">☰ Resumen</div>
  </nav>

<script>
  // =========================
  // Estado / Storage
  // =========================
  const KEY = "app_gastos_v2";
  const state = JSON.parse(localStorage.getItem(KEY)) || {
    cards: [],        // {id, name, bank, cutDay, payDay}
    expenses: [],     // {id, amount, date, category, cardId, note}
    incomeByMonth: {},// {"YYYY-MM": { q1:number, q2:number }}
    savings: []       // {id, amount, date, type:"deposit"|"withdraw", note}
  };

  // Migración simple desde v1 (si existe)
  (function migrateFromV1(){
    const oldKey = "app_gastos_v1";
    if(localStorage.getItem(KEY)) return; // ya está en v2
    const old = localStorage.getItem(oldKey);
    if(!old) return;
    try{
      const data = JSON.parse(old);
      if(!data || !Array.isArray(data.cards) || !Array.isArray(data.expenses)) return;
      state.cards = data.cards || [];
      state.expenses = data.expenses || [];
      state.incomeByMonth = data.incomeByMonth || {};
      // normaliza nómina (mensual -> q1/q2)
      for(const k of Object.keys(state.incomeByMonth || {})){
        const v = state.incomeByMonth[k];
        if(typeof v === "number") state.incomeByMonth[k] = { q1:v, q2:0 };
        else state.incomeByMonth[k] = { q1:Number(v?.q1||0), q2:Number(v?.q2||0) };
      }
    }catch(_){}
  })();

  const CATEGORIES = [
    "Comida","Transporte","Gasolina","Super","Servicios","Salud","Escuela",
    "Viajes","Ahorro","Gastos generales","Entretenimiento","Compras","Otro"
  ];

  function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

  // =========================
  // Utilidades
  // =========================
  const fmt = (n)=> new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN"}).format(n||0);
  const pad2 = (n)=> String(n).padStart(2,"0");
  const todayISO = ()=> {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  };
  const monthKey = (iso)=> (iso||"").slice(0,7);
  const parseMoney = (s)=>{
    const x = Number(String(s).replace(/[^0-9.]/g,""));
    return Number.isFinite(x) ? x : NaN;
  };
  const cardName = (id)=> state.cards.find(c=>c.id===id)?.name || "—";
  const uid = ()=> (crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random());

  function getIncome(selectedMonth){
    const inc = state.incomeByMonth[selectedMonth] || { q1:0, q2:0 };
    return { q1:Number(inc.q1||0), q2:Number(inc.q2||0), total:Number(inc.q1||0)+Number(inc.q2||0) };
  }

  // =========================
  // Tabs
  // =========================
  const TAB_TO_VIEW = {
    Nomina: "vNomina",
    Tarjetas: "vTarjetas",
    Gastos: "vGastos",
    Ahorro: "vAhorro",
    Resumen: "vResumen",
  };

  function setTab(name){
    document.querySelectorAll(".tab").forEach(t=>{
      t.classList.toggle("active", t.dataset.tab === name);
    });
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.getElementById(TAB_TO_VIEW[name]).classList.add("active");
    render();
  }

  document.querySelectorAll(".tab").forEach(t=>{
    t.addEventListener("click", ()=> setTab(t.dataset.tab));
  });

  // =========================
  // Render
  // =========================
  function render(){
    renderNomina();
    renderTarjetas();
    renderGastos();
    renderAhorro();
    renderResumen();
    save();
  }

  // =========================
  // Nómina (desplegable Q1/Q2)
  // =========================
  function renderNomina(){
    const el = document.getElementById("vNomina");
    const now = new Date();
    const mk = `${now.getFullYear()}-${pad2(now.getMonth()+1)}`;

    const selectedMonth = (document.getElementById("nMonth")?.value) || mk;
    const q = (document.getElementById("nQuincena")?.value) || "q1";
    const inc = getIncome(selectedMonth);

    el.innerHTML = `
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--muted)">Nómina por quincena</h3>
        <div class="note">Guarda tu ingreso por quincena: <b>Q1</b> (1ª) y <b>Q2</b> (2ª). Aquí se calcula el total del mes.</div>

        <div style="height:12px"></div>

        <div class="row two">
          <div>
            <label>Mes</label>
            <input type="month" id="nMonth" value="${selectedMonth}">
          </div>
          <div>
            <label>Quincena (desplegable)</label>
            <select id="nQuincena">
              <option value="q1">Q1 (1ª quincena)</option>
              <option value="q2">Q2 (2ª quincena)</option>
            </select>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="row two">
          <div>
            <label>Monto de la quincena seleccionada</label>
            <input id="nMonto" inputmode="decimal" placeholder="Ej. 9000">
          </div>
          <div>
            <label>Acciones</label>
            <div class="btns" style="margin:0">
              <button class="good" id="btnSaveNomina">Guardar</button>
              <button class="secondary" id="btnClearNomina">Borrar mes</button>
            </div>
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="kpi">
          <div class="k">
            <div class="t">Q1 guardada</div>
            <div class="v">${fmt(inc.q1)}</div>
          </div>
          <div class="k">
            <div class="t">Q2 guardada</div>
            <div class="v">${fmt(inc.q2)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi">
          <div class="k">
            <div class="t">Total nómina del mes (Q1 + Q2)</div>
            <div class="v">${fmt(inc.total)}</div>
          </div>
          <div class="k">
            <div class="t">Tip</div>
            <div class="v" style="font-size:13px;font-weight:800;color:var(--muted)">Después ve a “Resumen” para ver Disponible.</div>
          </div>
        </div>
      </div>
    `;

    // Set dropdown + monto prefill
    const sel = el.querySelector("#nQuincena");
    sel.value = q;

    const monto = el.querySelector("#nMonto");
    monto.value = (q==="q1" ? (inc.q1||"") : (inc.q2||"")) || "";

    el.querySelector("#nMonth").onchange = render;
    el.querySelector("#nQuincena").onchange = render;

    el.querySelector("#btnSaveNomina").onclick = ()=>{
      const month = el.querySelector("#nMonth").value;
      const which = el.querySelector("#nQuincena").value;
      const v = parseMoney(el.querySelector("#nMonto").value);

      if(!month) return alert("Selecciona un mes.");
      if(!Number.isFinite(v) || v < 0) return alert("Monto inválido.");

      const current = getIncome(month);
      const next = { q1: current.q1, q2: current.q2 };
      next[which] = v;

      state.incomeByMonth[month] = next;
      render();
    };

    el.querySelector("#btnClearNomina").onclick = ()=>{
      const month = el.querySelector("#nMonth").value;
      if(!month) return;
      if(confirm("¿Borrar nómina (Q1 y Q2) de este mes?")){
        delete state.incomeByMonth[month];
        render();
      }
    };
  }

  // =========================
  // Resumen (ya sin capturar nómina aquí)
  // =========================
  function renderResumen(){
    const el = document.getElementById("vResumen");

    const now = new Date();
    const mk = `${now.getFullYear()}-${pad2(now.getMonth()+1)}`;

    const selectedMonth = (document.getElementById("filterMonth")?.value) || mk;
    const selectedCard = (document.getElementById("filterCard")?.value) || "__all__";

    const filtered = state.expenses.filter(e=>{
      const okM = monthKey(e.date) === selectedMonth;
      const okC = (selectedCard==="__all__") || (e.cardId === selectedCard);
      return okM && okC;
    });

    const monthTotal = filtered.reduce((s,e)=>s+e.amount,0);
    const allTotal = state.expenses.reduce((s,e)=>s+e.amount,0);

    const inc = getIncome(selectedMonth);
    const available = inc.total - monthTotal;

    // Totales por categoría del mes
    const catMap = new Map(CATEGORIES.map(c=>[c,0]));
    filtered.forEach(e=>{
      catMap.set(e.category, (catMap.get(e.category)||0) + e.amount);
    });

    const cardOptions = [
      `<option value="__all__">Todas</option>`,
      ...state.cards.map(c=> `<option value="${c.id}">${c.name}</option>`)
    ].join("");

    el.innerHTML = `
      <div class="card">
        <div class="kpi">
          <div class="k">
            <div class="t">Nómina del mes (Q1 + Q2)</div>
            <div class="v">${fmt(inc.total)}</div>
          </div>
          <div class="k">
            <div class="t">Total del mes (gastos)</div>
            <div class="v">${fmt(monthTotal)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi">
          <div class="k">
            <div class="t">Disponible del mes (Nómina - Gastos)</div>
            <div class="v">${fmt(available)}</div>
          </div>
          <div class="k">
            <div class="t">Total general (todos los meses)</div>
            <div class="v">${fmt(allTotal)}</div>
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="row two">
          <div>
            <label>Filtrar por mes</label>
            <input type="month" id="filterMonth" value="${selectedMonth}">
          </div>
          <div>
            <label>Filtrar por tarjeta/departamental</label>
            <select id="filterCard">${cardOptions}</select>
          </div>
        </div>

        <div class="btns">
          <button class="secondary" id="btnExport">Exportar respaldo (.json)</button>
          <button class="secondary" id="btnImport">Importar respaldo</button>
          <input type="file" id="fileImport" accept="application/json" style="display:none">
        </div>

        ${state.cards.length ? "" : `<div class="warnBox">Aún no tienes tarjetas. Ve a <b>Tarjetas</b> para agregar una (por ejemplo: Nu, BBVA, Liverpool, Suburbia).</div>`}
      </div>

      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--muted)">Gasto del mes por categoría</h3>
        <div class="note">Respeta el filtro de mes y tarjeta.</div>
        <div style="height:10px"></div>

        <table>
          <thead><tr><th>Categoría</th><th>Total</th></tr></thead>
          <tbody>
            ${CATEGORIES.map(c=>`
              <tr>
                <td>${c}</td>
                <td>${fmt(catMap.get(c)||0)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `;

    // Set selected card after render
    const fc = el.querySelector("#filterCard");
    if (fc) fc.value = selectedCard;

    el.querySelector("#filterMonth").onchange = render;
    el.querySelector("#filterCard").onchange = render;

    el.querySelector("#btnExport").onclick = ()=>{
      const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "gastos-respaldo.json";
      document.body.appendChild(a);
      a.click();
      setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 500);
    };

    const file = el.querySelector("#fileImport");
    el.querySelector("#btnImport").onclick = ()=> file.click();
    file.onchange = async (ev)=>{
      const f = ev.target.files?.[0];
      if(!f) return;
      try{
        const txt = await f.text();
        const data = JSON.parse(txt);
        if(!data || !Array.isArray(data.cards) || !Array.isArray(data.expenses)) throw new Error("Formato inválido");

        state.cards = data.cards || [];
        state.expenses = data.expenses || [];
        state.savings = Array.isArray(data.savings) ? data.savings : [];
        state.incomeByMonth = data.incomeByMonth || {};

        // normaliza income
        for(const k of Object.keys(state.incomeByMonth || {})){
          const v = state.incomeByMonth[k];
          if(typeof v === "number") state.incomeByMonth[k] = { q1:v, q2:0 };
          else state.incomeByMonth[k] = { q1:Number(v?.q1||0), q2:Number(v?.q2||0) };
        }

        render();
        alert("Respaldo importado.");
      }catch(e){
        alert("No pude importar el archivo. Asegúrate que sea un respaldo válido.");
      }finally{
        file.value = "";
      }
    };
  }

  // =========================
  // Gastos
  // =========================
  function renderGastos(){
    const el = document.getElementById("vGastos");

    el.innerHTML = `
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--muted)">Registrar gasto</h3>
        <div class="note">Categorías son desplegables. Si no tienes tarjetas, primero agrega una en “Tarjetas”.</div>

        ${state.cards.length ? "" : `<div class="warnBox">No hay tarjetas todavía. Ve a <b>Tarjetas</b> para agregar una y luego registra gastos.</div>`}

        <div style="height:10px"></div>

        <div class="row two">
          <div>
            <label>Monto</label>
            <input id="gAmount" inputmode="decimal" placeholder="Ej. 350.50">
          </div>
          <div>
            <label>Fecha</label>
            <input id="gDate" type="date" value="${todayISO()}">
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="row two">
          <div>
            <label>Categoría</label>
            <select id="gCategory">
              ${CATEGORIES.map(c=>`<option>${c}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>Tarjeta / Departamental</label>
            <select id="gCard">
              ${state.cards.length
                ? state.cards.map(c=>`<option value="${c.id}">${c.name}</option>`).join("")
                : `<option value="">Primero agrega una tarjeta</option>`
              }
            </select>
          </div>
        </div>

        <div style="height:10px"></div>

        <label>Nota (opcional)</label>
        <textarea id="gNote" placeholder="Ej. Gasolina / Uber / Liverpool / etc."></textarea>

        <div class="btns">
          <button id="btnAddExpense">Agregar gasto</button>
          <button class="secondary" id="btnClearExpense">Limpiar</button>
        </div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--muted)">Lista de gastos</h3>

        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tarjeta</th>
              <th>Categoría</th>
              <th>Monto</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${state.expenses.length ? state.expenses
              .slice()
              .sort((a,b)=> (a.date < b.date ? 1 : -1))
              .map(e=>`
                <tr>
                  <td>${e.date}</td>
                  <td>${cardName(e.cardId)}</td>
                  <td>${e.category}</td>
                  <td>${fmt(e.amount)}</td>
                  <td><button class="danger" data-del="${e.id}">X</button></td>
                </tr>
              `).join("") : `<tr><td colspan="5" class="note">Aún no hay gastos.</td></tr>`
            }
          </tbody>
        </table>
      </div>
    `;

    el.querySelector("#btnAddExpense").onclick = ()=>{
      if(!state.cards.length){
        alert("Primero agrega una tarjeta.");
        setTab("Tarjetas");
        return;
      }
      const amount = parseMoney(el.querySelector("#gAmount").value);
      const date = el.querySelector("#gDate").value;
      const category = el.querySelector("#gCategory").value;
      const cardId = el.querySelector("#gCard").value;
      const note = el.querySelector("#gNote").value.trim();

      if(!Number.isFinite(amount) || amount<=0) return alert("Monto inválido.");
      if(!date) return alert("Selecciona una fecha.");
      if(!cardId) return alert("Selecciona una tarjeta.");

      state.expenses.push({ id: uid(), amount, date, category, cardId, note });

      render();
      setTab("Gastos");
    };

    el.querySelector("#btnClearExpense").onclick = ()=>{
      el.querySelector("#gAmount").value = "";
      el.querySelector("#gNote").value = "";
      el.querySelector("#gDate").value = todayISO();
      el.querySelector("#gCategory").selectedIndex = 0;
    };

    el.querySelectorAll("button[data-del]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute("data-del");
        state.expenses = state.expenses.filter(x=>x.id !== id);
        render();
        setTab("Gastos");
      };
    });
  }

  // =========================
  // Tarjetas
  // =========================
  function renderTarjetas(){
    const el = document.getElementById("vTarjetas");

    el.innerHTML = `
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--muted)">Agregar tarjeta / departamental</h3>
        <div class="note">Ejemplos: Nu, BBVA, Santander, Liverpool, Suburbia, Coppel… (sin números).</div>

        <div style="height:10px"></div>

        <div class="row two">
          <div>
            <label>Nombre</label>
            <input id="cName" placeholder="Ej. Liverpool / Suburbia / Nu / BBVA Azul">
          </div>
          <div>
            <label>Banco/Tienda (opcional)</label>
            <input id="cBank" placeholder="Ej. Liverpool">
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="row two">
          <div>
            <label>Día de corte (1–28)</label>
            <input id="cCut" type="number" min="1" max="28" placeholder="Ej. 15">
          </div>
          <div>
            <label>Día límite de pago (1–28)</label>
            <input id="cPay" type="number" min="1" max="28" placeholder="Ej. 5">
          </div>
        </div>

        <div class="btns">
          <button class="good" id="btnAddCard">Guardar tarjeta</button>
          <button class="secondary" id="btnClearCard">Limpiar</button>
        </div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--muted)">Mis tarjetas</h3>

        ${state.cards.length ? `
          <table>
            <thead><tr><th>Nombre</th><th>Corte</th><th>Pago</th><th></th></tr></thead>
            <tbody>
              ${state.cards.map(c=>`
                <tr>
                  <td>${c.name}</td>
                  <td>${c.cutDay}</td>
                  <td>${c.payDay}</td>
                  <td><button class="danger" data-delcard="${c.id}">X</button></td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        ` : `<div class="note">Aún no agregas tarjetas. Usa el formulario de arriba.</div>`}

        <div style="height:10px"></div>
        <button class="danger" id="btnNuke">Borrar TODO</button>
        <div class="note" style="margin-top:8px">⚠️ Borra tarjetas, gastos, nóminas y ahorro de este dispositivo.</div>
      </div>
    `;

    el.querySelector("#btnAddCard").onclick = ()=>{
      const name = el.querySelector("#cName").value.trim();
      const bank = el.querySelector("#cBank").value.trim();
      const cut = Number(el.querySelector("#cCut").value);
      const pay = Number(el.querySelector("#cPay").value);

      if(!name) return alert("Pon un nombre para la tarjeta.");
      if(!(cut>=1 && cut<=28) || !(pay>=1 && pay<=28)) return alert("Corte y pago deben ser entre 1 y 28.");

      state.cards.push({ id: uid(), name, bank, cutDay: cut, payDay: pay });

      render();
      setTab("Gastos");
    };

    el.querySelector("#btnClearCard").onclick = ()=>{
      el.querySelector("#cName").value = "";
      el.querySelector("#cBank").value = "";
      el.querySelector("#cCut").value = "";
      el.querySelector("#cPay").value = "";
    };

    el.querySelectorAll("button[data-delcard]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute("data-delcard");
        if(confirm("¿Eliminar esta tarjeta?")){
          state.cards = state.cards.filter(c=>c.id !== id);
          render();
          setTab("Tarjetas");
        }
      };
    });

    el.querySelector("#btnNuke").onclick = ()=>{
      if(confirm("¿Seguro? Se borrará TODO del dispositivo.")){
        localStorage.removeItem(KEY);
        localStorage.removeItem("app_gastos_v1");
        location.reload();
      }
    };
  }

  // =========================
  // Ahorro (registro independiente)
  // =========================
  function renderAhorro(){
    const el = document.getElementById("vAhorro");
    const now = new Date();
    const mk = `${now.getFullYear()}-${pad2(now.getMonth()+1)}`;
    const selectedMonth = (document.getElementById("sMonth")?.value) || mk;

    const list = state.savings
      .filter(s=> monthKey(s.date) === selectedMonth)
      .slice()
      .sort((a,b)=> (a.date < b.date ? 1 : -1));

    const net = list.reduce((sum,s)=> sum + (s.type==="deposit" ? s.amount : -s.amount), 0);
    const deposits = list.filter(s=>s.type==="deposit").reduce((a,s)=>a+s.amount,0);
    const withdrawals = list.filter(s=>s.type==="withdraw").reduce((a,s)=>a+s.amount,0);

    el.innerHTML = `
      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--muted)">Ahorro</h3>
        <div class="note">Registra depósitos o retiros de tu ahorro (independiente de “Gastos”).</div>

        <div style="height:12px"></div>

        <div class="row two">
          <div>
            <label>Mes</label>
            <input type="month" id="sMonth" value="${selectedMonth}">
          </div>
          <div>
            <label>Tipo</label>
            <select id="sType">
              <option value="deposit">Depósito (ahorrar)</option>
              <option value="withdraw">Retiro</option>
            </select>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="row two">
          <div>
            <label>Monto</label>
            <input id="sAmount" inputmode="decimal" placeholder="Ej. 500">
          </div>
          <div>
            <label>Fecha</label>
            <input id="sDate" type="date" value="${todayISO()}">
          </div>
        </div>

        <div style="height:10px"></div>

        <label>Nota (opcional)</label>
        <textarea id="sNote" placeholder="Ej. Ahorro para viaje / Emergencias / etc."></textarea>

        <div class="btns">
          <button class="good" id="btnAddSaving">Agregar</button>
          <button class="secondary" id="btnClearSaving">Limpiar</button>
        </div>

        <div style="height:12px"></div>

        <div class="kpi">
          <div class="k">
            <div class="t">Depósitos del mes</div>
            <div class="v">${fmt(deposits)}</div>
          </div>
          <div class="k">
            <div class="t">Retiros del mes</div>
            <div class="v">${fmt(withdrawals)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi">
          <div class="k" style="grid-column:1/-1">
            <div class="t">Ahorro neto del mes (depósitos - retiros)</div>
            <div class="v">${fmt(net)}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--muted)">Movimientos de ahorro</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Monto</th>
              <th>Nota</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${list.length ? list.map(s=>`
              <tr>
                <td>${s.date}</td>
                <td>${s.type==="deposit" ? "Depósito" : "Retiro"}</td>
                <td>${fmt(s.amount)}</td>
                <td>${(s.note||"").replaceAll("<","&lt;")}</td>
                <td><button class="danger" data-dels="${s.id}">X</button></td>
              </tr>
            `).join("") : `<tr><td colspan="5" class="note">Aún no hay movimientos de ahorro en este mes.</td></tr>`}
          </tbody>
        </table>
      </div>
    `;

    el.querySelector("#sMonth").onchange = render;

    el.querySelector("#btnAddSaving").onclick = ()=>{
      const amount = parseMoney(el.querySelector("#sAmount").value);
      const date = el.querySelector("#sDate").value;
      const type = el.querySelector("#sType").value;
      const note = el.querySelector("#sNote").value.trim();

      if(!Number.isFinite(amount) || amount<=0) return alert("Monto inválido.");
      if(!date) return alert("Selecciona una fecha.");

      state.savings.push({ id: uid(), amount, date, type, note });
      render();
      setTab("Ahorro");
    };

    el.querySelector("#btnClearSaving").onclick = ()=>{
      el.querySelector("#sAmount").value = "";
      el.querySelector("#sNote").value = "";
      el.querySelector("#sDate").value = todayISO();
      el.querySelector("#sType").value = "deposit";
    };

    el.querySelectorAll("button[data-dels]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute("data-dels");
        state.savings = state.savings.filter(x=>x.id !== id);
        render();
        setTab("Ahorro");
      };
    });
  }

  // =========================
  // PWA instalada: forzar modo móvil
  // =========================
  function isStandalone(){
    return window.matchMedia("(display-mode: standalone)").matches
      || window.navigator.standalone
      || document.referrer.includes("android-app://");
  }
  function isTouch(){
    return ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
  }
  if(isStandalone() && isTouch()){
    document.body.classList.add("pwa-mobile");
  }

  // =========================
  // Init
  // =========================
  document.getElementById("fechaHoy").textContent =
    new Date().toLocaleDateString("es-MX", { dateStyle:"full" });

  render();
</script>
</body>
</html>
