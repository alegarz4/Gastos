<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gastos</title>

<style>

:root{
--bg:#0b1220;
--card:#121a2c;
--text:#e8f0ff;
--muted:#93a4c7;
--line:#1f2a40;
--accent:#3b82f6;
--good:#22c55e;
--danger:#ef4444;
--radius:14px;
--navH:70px;
}

*{box-sizing:border-box;font-family:system-ui;}

body{
margin:0;
background:linear-gradient(180deg,#0b1220,#0e1628);
color:var(--text);
}

header{
padding:14px;
border-bottom:1px solid var(--line);
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
font-size:18px;
}

.small{
font-size:12px;
color:var(--muted);
}

.wrap{
padding:14px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:var(--radius);
padding:14px;
margin-bottom:14px;
}

label{
font-size:12px;
color:var(--muted);
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:4px;
border-radius:10px;
border:1px solid var(--line);
background:#0f172a;
color:white;
}

textarea{
min-height:70px;
}

.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn-primary{
background:var(--accent);
color:white;
}

.btn-good{
background:var(--good);
}

.btn-danger{
background:var(--danger);
}

.btn-secondary{
background:#2b3550;
color:white;
}

.kpi{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.k{
background:#0f172a;
padding:10px;
border-radius:10px;
border:1px solid var(--line);
}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

td,th{
padding:8px;
border-bottom:1px solid var(--line);
}

.bottomNav{
position:fixed;
bottom:0;
left:0;
right:0;
height:var(--navH);
background:#0b1220;
border-top:1px solid var(--line);
display:flex;
}

.tab{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
cursor:pointer;
}

.tab.active{
background:#1e293b;
}

.view{
display:none;
}

.view.active{
display:block;
}

body.pwa-mobile .desktopGrid{
display:none;
}

body.pwa-mobile .bottomNav{
display:flex;
}

</style>
</head>

<body>

<header>
<div>
<h1>Gastos</h1>
<div class="small">Control personal de gastos</div>
</div>

<div id="fechaHoy" class="small"></div>
</header>

<div class="wrap">

<div id="viewResumen" class="view active"></div>
<div id="viewGastos" class="view"></div>
<div id="viewTarjetas" class="view"></div>

</div>

<div class="bottomNav">

<div class="tab active" data-tab="Resumen">Resumen</div>
<div class="tab" data-tab="Gastos">Gastos</div>
<div class="tab" data-tab="Tarjetas">Tarjetas</div>

</div>

<script>

const KEY="gastos_app";

const state=JSON.parse(localStorage.getItem(KEY)) || {
cards:[],
expenses:[],
income:{}
};

const categories=[
"Comida",
"Transporte",
"Gasolina",
"Super",
"Servicios",
"Salud",
"Escuela",
"Viajes",
"Ahorro",
"Gastos generales",
"Entretenimiento",
"Compras",
"Otro"
];

function save(){
localStorage.setItem(KEY,JSON.stringify(state));
}

function money(n){
return new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN"}).format(n||0);
}

function today(){
return new Date().toISOString().split("T")[0];
}

document.getElementById("fechaHoy").innerText=
new Date().toLocaleDateString("es-MX",{dateStyle:"full"});

function render(){

renderResumen();
renderGastos();
renderTarjetas();

save();
}

function renderResumen(){

const view=document.getElementById("viewResumen");

let month=state.expenses.reduce((s,e)=>s+e.amount,0);

let income=state.income["global"]||0;

let disponible=income-month;

let catTotals={};

categories.forEach(c=>catTotals[c]=0);

state.expenses.forEach(e=>{
catTotals[e.category]+=e.amount;
});

view.innerHTML=`

<div class="card">

<div class="kpi">

<div class="k">
<div class="small">Total gastos</div>
<b>${money(month)}</b>
</div>

<div class="k">
<div class="small">Disponible</div>
<b>${money(disponible)}</b>
</div>

</div>

<br>

<label>Nómina</label>
<input id="incomeInput" placeholder="Ej 18000">

<br><br>

<button class="btn-good" onclick="saveIncome()">Guardar nómina</button>

</div>

<div class="card">

<b>Gasto por categoría</b>

<table>

${categories.map(c=>`
<tr>
<td>${c}</td>
<td>${money(catTotals[c])}</td>
</tr>
`).join("")}

</table>

</div>

`;

}

function saveIncome(){
let v=parseFloat(document.getElementById("incomeInput").value||0);
state.income["global"]=v;
render();
}

function renderGastos(){

const view=document.getElementById("viewGastos");

view.innerHTML=`

<div class="card">

<div class="row">

<div>
<label>Monto</label>
<input id="amount">
</div>

<div>
<label>Fecha</label>
<input id="date" type="date" value="${today()}">
</div>

</div>

<br>

<div class="row">

<div>
<label>Categoría</label>
<select id="category">

${categories.map(c=>`<option>${c}</option>`).join("")}

</select>
</div>

<div>
<label>Tarjeta</label>
<select id="card">

${state.cards.map(c=>`<option value="${c.id}">${c.name}</option>`)}

</select>
</div>

</div>

<br>

<label>Nota</label>
<textarea id="note"></textarea>

<br><br>

<button class="btn-primary" onclick="addExpense()">Agregar gasto</button>

</div>

<div class="card">

<table>

<tr>
<th>Fecha</th>
<th>Monto</th>
<th></th>
</tr>

${state.expenses.map(e=>`
<tr>
<td>${e.date}</td>
<td>${money(e.amount)}</td>
<td>
<button class="btn-danger" onclick="delExpense('${e.id}')">X</button>
</td>
</tr>
`).join("")}

</table>

</div>

`;

}

function addExpense(){

let amount=parseFloat(document.getElementById("amount").value);

if(!amount)return;

state.expenses.push({

id:Date.now(),

amount:amount,

date:document.getElementById("date").value,

category:document.getElementById("category").value,

card:document.getElementById("card").value,

note:document.getElementById("note").value

});

render();

}

function delExpense(id){

state.expenses=state.expenses.filter(e=>e.id!=id);

render();

}

function renderTarjetas(){

const view=document.getElementById("viewTarjetas");

view.innerHTML=`

<div class="card">

<label>Nombre tarjeta</label>
<input id="cardName">

<br><br>

<button class="btn-primary" onclick="addCard()">Agregar tarjeta</button>

</div>

<div class="card">

${state.cards.map(c=>`

<div style="display:flex;justify-content:space-between;margin-bottom:8px">

<div>${c.name}</div>

<button class="btn-danger" onclick="delCard('${c.id}')">X</button>

</div>

`).join("")}

</div>

`;

}

function addCard(){

let name=document.getElementById("cardName").value;

if(!name)return;

state.cards.push({
id:Date.now(),
name:name
});

render();

}

function delCard(id){

state.cards=state.cards.filter(c=>c.id!=id);

render();

}

document.querySelectorAll(".tab").forEach(t=>{

t.onclick=()=>{

document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
t.classList.add("active");

document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));

document.getElementById("view"+t.dataset.tab).classList.add("active");

};

});

function isStandalone(){
return window.matchMedia('(display-mode: standalone)').matches 
|| window.navigator.standalone 
|| document.referrer.includes('android-app://');
}

function isTouch(){
return ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
}

if(isStandalone() && isTouch()){
document.body.classList.add("pwa-mobile");
}

render();

</script>

</body>
</html>
