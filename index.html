<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gastos v5.0</title>
  <meta name="theme-color" content="#1a0c12" />
  <style>
    :root{
      --bg:#1a0c12;
      --bg2:#12070c;
      --card:rgba(74,24,39,.48);
      --card-strong:rgba(97,31,52,.65);
      --fg:#fff8fb;
      --muted:#e8cfd8;
      --line:rgba(255,255,255,.09);
      --line-strong:rgba(255,255,255,.14);
      --accent:#a61d44;
      --accent2:#d9466a;
      --good:#16a34a;
      --danger:#dc2626;
      --soft:rgba(104,35,56,.38);
      --warn:#f59e0b;
      --violet:#8b5cf6;
      --glass:rgba(255,255,255,.05);
      --r:18px;
      --navH:84px;
      --shadow:0 14px 34px rgba(0,0,0,.28);
      --shadow-soft:0 8px 18px rgba(0,0,0,.18);
    }

    *{ box-sizing:border-box; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      color:var(--fg);
      background:
        radial-gradient(900px 500px at 10% -10%, rgba(217,70,106,.14), transparent 55%),
        radial-gradient(900px 500px at 100% 0%, rgba(139,92,246,.10), transparent 50%),
        linear-gradient(180deg, #16090f 0%, #1a0c12 45%, #12070c 100%);
      min-height:100vh;
    }

    header{
      position:sticky; top:0; z-index:20;
      background:rgba(26,12,18,.60);
      backdrop-filter:blur(14px) saturate(145%);
      -webkit-backdrop-filter:blur(14px) saturate(145%);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .title{display:flex; flex-direction:column; gap:2px;}
    h1{margin:0; font-size:18px; letter-spacing:.2px;}
    .sub{font-size:12px; color:var(--muted);}
    .topRight{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}

    .pill{
      font-size:12px;
      color:var(--muted);
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:999px;
      white-space:nowrap;
      background:rgba(255,255,255,.04);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .versionBadge{
      font-size:12px;
      color:#fff1f4;
      border:1px solid rgba(217,70,106,.26);
      padding:6px 10px;
      border-radius:999px;
      background:linear-gradient(135deg, rgba(166,29,68,.38), rgba(139,92,246,.15));
      white-space:nowrap;
      box-shadow:var(--shadow-soft);
    }

    main{
      padding:14px 14px calc(var(--navH) + 22px);
      max-width:1200px;
      margin:0 auto;
    }

    .card{
      background:var(--card);
      backdrop-filter:blur(14px) saturate(140%);
      -webkit-backdrop-filter:blur(14px) saturate(140%);
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:14px;
      box-shadow:var(--shadow);
      margin-bottom:12px;
    }

    .row{display:grid; gap:10px;}
    @media(min-width:640px){
      .row.two{grid-template-columns:1fr 1fr;}
      .row.three{grid-template-columns:1fr 1fr 1fr;}
      .row.four{grid-template-columns:1fr 1fr 1fr 1fr;}
      .row.five{grid-template-columns:repeat(5,1fr);}
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:12px;
      color:var(--muted);
    }

    input, select, textarea{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.05);
      color:var(--fg);
      outline:none;
      transition:.18s ease;
    }

    input:focus, select:focus, textarea:focus{
      border-color:rgba(217,70,106,.42);
      box-shadow:0 0 0 3px rgba(217,70,106,.10);
      background:rgba(255,255,255,.06);
    }

    input::placeholder, textarea::placeholder{ color:#d9b6c2; }
    textarea{min-height:70px; resize:vertical;}

    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:10px;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
      background:linear-gradient(135deg, var(--accent), rgba(217,70,106,.92));
      box-shadow:var(--shadow-soft);
      transition:.16s ease;
    }

    button:hover{ filter:brightness(1.03); }
    button:active{ transform:translateY(1px); }
    button.secondary{
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      color:var(--fg);
    }
    button.good{ background:linear-gradient(135deg, #15803d, #22c55e); }
    button.danger{ background:linear-gradient(135deg, #b91c1c, #ef4444); }
    button.warn{ background:linear-gradient(135deg, #f59e0b, #fbbf24); color:#111827; }
    button.violet{ background:linear-gradient(135deg, #7c3aed, #8b5cf6); }
    button.small{
      padding:7px 10px;
      font-size:12px;
      border-radius:10px;
    }

    .kpi{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    @media(min-width:760px){
      .kpi.three{grid-template-columns:repeat(3,1fr);}
      .kpi.four{grid-template-columns:repeat(4,1fr);}
      .kpi.five{grid-template-columns:repeat(5,1fr);}
      .kpi.six{grid-template-columns:repeat(6,1fr);}
      .kpi.seven{grid-template-columns:repeat(7,1fr);}
    }

    .k{
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
    }

    .k .t{font-size:12px; color:var(--muted);}
    .k .v{font-size:18px; font-weight:900; margin-top:6px; line-height:1.2;}
    .k.negative{
      border-color:rgba(220,38,38,.35);
      background:rgba(220,38,38,.10);
    }
    .k.positive{
      border-color:rgba(22,163,74,.35);
      background:rgba(22,163,74,.10);
    }
    .k.warnish{
      border-color:rgba(245,158,11,.35);
      background:rgba(245,158,11,.10);
    }

    .view{display:none;}
    .view.active{display:block;}

    .bottomNav{
      position:fixed;
      left:0; right:0; bottom:0;
      height:var(--navH);
      padding:10px 10px calc(10px + env(safe-area-inset-bottom));
      border-top:1px solid var(--line);
      background:rgba(26,12,18,.64);
      backdrop-filter:blur(14px) saturate(145%);
      -webkit-backdrop-filter:blur(14px) saturate(145%);
      display:flex;
      gap:10px;
      z-index:30;
      overflow-x:auto;
    }

    .tab{
      min-width:120px;
      flex:1;
      border:1px solid var(--line);
      border-radius:14px;
      background:rgba(255,255,255,.04);
      color:var(--fg);
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      padding:0 10px;
      text-align:center;
      transition:.16s ease;
    }

    .tab.active{
      background:linear-gradient(135deg, rgba(166,29,68,.72), rgba(217,70,106,.15));
      border-color:rgba(217,70,106,.28);
      box-shadow:var(--shadow-soft);
    }

    .tableWrap{
      overflow:auto;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:820px;
      background:transparent;
    }

    th,td{
      padding:10px;
      border-bottom:1px solid var(--line);
      font-size:13px;
      vertical-align:top;
    }

    th{
      color:var(--muted);
      text-align:left;
      background:rgba(255,255,255,.05);
      position:sticky;
      top:0;
      z-index:1;
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    tr:last-child td{border-bottom:0;}

    .note{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .warnBox, .okBox, .infoBox{
      padding:10px 12px;
      border-radius:12px;
      font-size:12px;
      margin-top:10px;
      line-height:1.45;
    }

    .warnBox{
      border:1px solid rgba(220,38,38,.32);
      background:rgba(220,38,38,.10);
      color:#fff2f2;
    }

    .okBox{
      border:1px solid rgba(22,163,74,.30);
      background:rgba(22,163,74,.10);
      color:#f0fff4;
    }

    .infoBox{
      border:1px solid rgba(217,70,106,.26);
      background:rgba(217,70,106,.08);
      color:#fff3f6;
    }

    .sectionTitle{
      margin:0 0 10px;
      font-size:14px;
      color:var(--muted);
    }

    .hidden{ display:none !important; }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:space-between;
    }

    .toolbar .left, .toolbar .right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .searchInput{ min-width:220px; }

    .muted{
      color:var(--muted);
      font-size:12px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:#fff1f4;
      border:1px solid rgba(217,70,106,.22);
      background:rgba(166,29,68,.18);
      border-radius:999px;
      padding:5px 9px;
    }

    .actions{
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }

    .alertGrid{
      display:grid;
      gap:10px;
    }

    @media(min-width:760px){
      .alertGrid.two{grid-template-columns:1fr 1fr;}
    }

    .alertItem{
      border:1px solid rgba(217,70,106,.20);
      background:rgba(255,255,255,.04);
      border-radius:14px;
      padding:12px;
    }

    .alertUrgent{
      border:1px solid rgba(245,158,11,.32);
      background:linear-gradient(135deg, rgba(245,158,11,.15), rgba(166,29,68,.10));
      box-shadow:0 0 0 1px rgba(245,158,11,.08) inset;
    }

    .alertTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:6px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:5px 9px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
    }

    .badge.today{ background:#dc2626; color:#fff; }
    .badge.tomorrow{ background:#f59e0b; color:#111827; }
    .badge.soon{ background:#a61d44; color:#fff; }
    .badge.later{ background:rgba(255,255,255,.06); color:#fff; border:1px solid var(--line); }

    .rightText{text-align:right;}
    .mono{font-variant-numeric:tabular-nums;}
    .progress{
      width:100%;
      height:10px;
      background:rgba(255,255,255,.06);
      border-radius:999px;
      overflow:hidden;
      border:1px solid var(--line);
      margin-top:6px;
    }
    .bar{
      height:100%;
      width:0%;
      background:linear-gradient(90deg, rgba(166,29,68,.95), rgba(217,70,106,.95));
    }
    .bar.good{
      background:linear-gradient(90deg, #15803d, #22c55e);
    }
    .bar.warn{
      background:linear-gradient(90deg, #d97706, #f59e0b);
    }
    .bar.danger{
      background:linear-gradient(90deg, #b91c1c, #ef4444);
    }

    .toastWrap{
      position:fixed;
      top:14px;
      right:14px;
      z-index:60;
      display:flex;
      flex-direction:column;
      gap:8px;
      pointer-events:none;
    }

    .toast{
      min-width:220px;
      max-width:320px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line-strong);
      background:rgba(26,12,18,.82);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      color:#fff;
      box-shadow:var(--shadow);
      font-size:13px;
      animation:fadeInUp .18s ease;
    }

    .toast.good{ border-color:rgba(22,163,74,.35); }
    .toast.warn{ border-color:rgba(245,158,11,.35); }
    .toast.danger{ border-color:rgba(220,38,38,.35); }

    @keyframes fadeInUp{
      from{ opacity:0; transform:translateY(8px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @media(max-width:640px){
      table{ min-width:760px; }
      .tab{ min-width:110px; }
      .toastWrap{ left:10px; right:10px; top:10px; }
      .toast{ min-width:auto; max-width:none; }
    }
  </style>
</head>
<body>
  <div class="toastWrap" id="toastWrap"></div>

  <header>
    <div class="title">
      <h1>Gastos</h1>
      <div class="sub">Control personal • Offline • Tarjetas • Presupuestos • CSV</div>
    </div>
    <div class="topRight">
      <div class="versionBadge" id="versionText">v5.0</div>
      <div class="pill" id="fechaHoy">—</div>
    </div>
  </header>

  <main>
    <section id="vTarjetas" class="view active"></section>
    <section id="vIngresos" class="view"></section>
    <section id="vEgresos" class="view"></section>
    <section id="vResumen" class="view"></section>
  </main>

  <nav class="bottomNav">
    <div class="tab active" data-tab="Tarjetas">▦ Tarjetas</div>
    <div class="tab" data-tab="Ingresos">💵 Ingresos</div>
    <div class="tab" data-tab="Egresos">－ Egresos</div>
    <div class="tab" data-tab="Resumen">☰ Resumen</div>
  </nav>

<script>
  const APP_VERSION = "v5.0";
  const KEY = "app_gastos_final_v50";
  const LEGACY_KEYS = [
    "app_gastos_final_v43",
    "app_gastos_final_v42",
    "app_gastos_final_v41",
    "app_gastos_final_v4",
    "app_gastos_final_v3"
  ];

  const emptyState = {
    cards: [],
    incomes: [],
    expenses: [],
    budgets: []
  };

  const INCOME_TYPES = [
    "Nómina",
    "Préstamo",
    "Venta",
    "Transferencia",
    "Devolución",
    "Apoyo familiar",
    "Ingreso extra",
    "Otro"
  ];

  const PURCHASE_CATEGORIES = [
    "Comida",
    "Transporte",
    "Gasolina",
    "Super",
    "Servicios",
    "Salud",
    "Escuela",
    "Viajes",
    "Ahorro",
    "Gastos generales",
    "Entretenimiento",
    "Compras",
    "Otro"
  ];

  const EXPENSE_MODE_LABEL = {
    purchase_card: "Compra con tarjeta",
    payment_card: "Pago a tarjeta",
    cash: "Efectivo",
    debit: "Débito",
    transfer: "Transferencia"
  };

  const ui = {
    activeTab: "Tarjetas",
    incomeSearch: "",
    expenseSearch: "",
    editingCardId: null,
    editingIncomeId: null,
    editingExpenseId: null,
    editingBudgetId: null
  };

  const TAB_TO_VIEW = {
    Tarjetas: "vTarjetas",
    Ingresos: "vIngresos",
    Egresos: "vEgresos",
    Resumen: "vResumen"
  };

  function structuredCloneSafe(obj){
    return JSON.parse(JSON.stringify(obj));
  }

  function pad2(n){
    return String(n).padStart(2,"0");
  }

  function todayISO(){
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  function uid(){
    return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random();
  }

  function validISO(v){
    return /^\d{4}-\d{2}-\d{2}$/.test(String(v || ""));
  }

  function validMonth(v){
    return /^\d{4}-\d{2}$/.test(String(v || ""));
  }

  function monthKey(iso){
    return String(iso || "").slice(0,7);
  }

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function normalizeText(v){
    return String(v ?? "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim();
  }

  function includesText(...values){
    return normalizeText(values.join(" "));
  }

  function parseMoney(v){
    let s = String(v ?? "").trim();
    if(!s) return NaN;

    s = s.replace(/\s+/g, "");
    s = s.replace(/[^\d,.-]/g, "");

    const hasComma = s.includes(",");
    const hasDot = s.includes(".");

    if(hasComma && hasDot){
      if(s.lastIndexOf(",") > s.lastIndexOf(".")){
        s = s.replace(/\./g, "");
        s = s.replace(",", ".");
      } else {
        s = s.replace(/,/g, "");
      }
    } else if(hasComma && !hasDot){
      s = s.replace(",", ".");
    }

    s = s.replace(/(?!^)-/g, "");
    const x = Number(s);
    return Number.isFinite(x) ? x : NaN;
  }

  function fmt(n){
    return new Intl.NumberFormat("es-MX", {
      style:"currency",
      currency:"MXN"
    }).format(Number(n || 0));
  }

  function isoFromDate(d){
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  function clampDay(year, monthIndex, day){
    const last = new Date(year, monthIndex + 1, 0).getDate();
    return Math.min(day, last);
  }

  function csvEscape(v){
    const s = String(v ?? "");
    return `"${s.replaceAll('"', '""')}"`;
  }

  function downloadTextFile(filename, content, type = "text/plain;charset=utf-8"){
    const blob = new Blob([content], {type});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  function toast(message, type = "good"){
    const wrap = document.getElementById("toastWrap");
    const div = document.createElement("div");
    div.className = `toast ${type}`;
    div.textContent = message;
    wrap.appendChild(div);
    setTimeout(()=>div.remove(), 2500);
  }

  function normalizeState(raw){
    const base = raw || {};
    const state = {
      cards: Array.isArray(base.cards) ? base.cards : [],
      incomes: Array.isArray(base.incomes) ? base.incomes : [],
      expenses: Array.isArray(base.expenses) ? base.expenses : [],
      budgets: Array.isArray(base.budgets) ? base.budgets : []
    };

    state.cards = state.cards.map(c => ({
      id: c.id || uid(),
      name: String(c.name || "").trim(),
      cutDay: Number(c.cutDay || 1),
      payDay: Number(c.payDay || 1),
      creditLimit: Number(c.creditLimit || 0)
    }));

    state.incomes = state.incomes.map(i => ({
      id: i.id || uid(),
      type: String(i.type || "Otro"),
      fortnight: i.fortnight === "Q2" ? "Q2" : "Q1",
      amount: Number(i.amount || 0),
      date: validISO(i.date) ? i.date : todayISO(),
      note: String(i.note || "")
    }));

    state.expenses = state.expenses.map(e => {
      let mode = e.mode || "";
      if(!mode){
        if(e.category === "Pago de tarjeta de crédito"){
          mode = "payment_card";
        } else {
          mode = "purchase_card";
        }
      }
      if(mode === "purchase") mode = "purchase_card";
      if(mode === "payment") mode = "payment_card";

      return {
        id: e.id || uid(),
        mode,
        category: String(e.category || "Otro"),
        cardId: String(e.cardId || ""),
        amount: Number(e.amount || 0),
        date: validISO(e.date) ? e.date : todayISO(),
        note: String(e.note || ""),
        sourceIncomeType: String(e.sourceIncomeType || "")
      };
    });

    state.budgets = state.budgets.map(b => ({
      id: b.id || uid(),
      month: validMonth(b.month) ? b.month : monthKey(todayISO()),
      category: PURCHASE_CATEGORIES.includes(b.category) ? b.category : "Otro",
      amount: Number(b.amount || 0)
    }));

    return state;
  }

  function loadState(){
    const current = localStorage.getItem(KEY);
    if(current){
      try{
        return normalizeState(JSON.parse(current));
      }catch{
        return structuredCloneSafe(emptyState);
      }
    }

    for(const oldKey of LEGACY_KEYS){
      const legacy = localStorage.getItem(oldKey);
      if(legacy){
        try{
          const normalized = normalizeState(JSON.parse(legacy));
          localStorage.setItem(KEY, JSON.stringify(normalized));
          return normalized;
        }catch{}
      }
    }

    return structuredCloneSafe(emptyState);
  }

  const state = loadState();

  function save(){
    localStorage.setItem(KEY, JSON.stringify(state));
  }

  function cardName(id){
    return state.cards.find(c=>c.id===id)?.name || "—";
  }

  function sumNominaIncomesForMonth(month, ignoreIncomeId = null){
    return state.incomes
      .filter(i =>
        monthKey(i.date) === month &&
        i.type === "Nómina" &&
        i.id !== ignoreIncomeId
      )
      .reduce((s,i)=>s + Number(i.amount || 0), 0);
  }

  function sumNominaPaymentsForMonth(month, ignoreExpenseId = null){
    return state.expenses
      .filter(e =>
        monthKey(e.date) === month &&
        e.mode === "payment_card" &&
        e.sourceIncomeType === "Nómina" &&
        e.id !== ignoreExpenseId
      )
      .reduce((s,e)=>s + Number(e.amount || 0), 0);
  }

  function getNominaDisponibleMonth(selectedMonth, ignoreExpenseId = null){
    const total = sumNominaIncomesForMonth(selectedMonth);
    const used = sumNominaPaymentsForMonth(selectedMonth, ignoreExpenseId);
    return Math.max(0, total - used);
  }

  function wouldIncomeChangeBreakNominaRules({ originalIncomeId = null, newType, newDate, newAmount }){
    const original = originalIncomeId
      ? state.incomes.find(i => i.id === originalIncomeId)
      : null;

    const monthsToCheck = new Set();
    if(original && original.type === "Nómina") monthsToCheck.add(monthKey(original.date));
    if(newType === "Nómina") monthsToCheck.add(monthKey(newDate));

    for(const month of monthsToCheck){
      const baseNomina = sumNominaIncomesForMonth(month, originalIncomeId);
      let simulatedNomina = baseNomina;

      if(newType === "Nómina" && monthKey(newDate) === month){
        simulatedNomina += Number(newAmount || 0);
      }

      const usedNomina = sumNominaPaymentsForMonth(month);
      if(usedNomina > simulatedNomina){
        return true;
      }
    }

    return false;
  }

  function getCurrentCycle(card){
    const now = new Date();
    const y = now.getFullYear();
    const m = now.getMonth();
    const today = now.getDate();
    const cutDay = Number(card.cutDay);

    let start, end;

    if(today > cutDay){
      start = new Date(y, m, clampDay(y, m, cutDay) + 1);
      const nextMonth = new Date(y, m + 1, 1);
      end = new Date(
        nextMonth.getFullYear(),
        nextMonth.getMonth(),
        clampDay(nextMonth.getFullYear(), nextMonth.getMonth(), cutDay)
      );
    } else {
      const prevMonth = new Date(y, m - 1, 1);
      start = new Date(
        prevMonth.getFullYear(),
        prevMonth.getMonth(),
        clampDay(prevMonth.getFullYear(), prevMonth.getMonth(), cutDay) + 1
      );
      end = new Date(y, m, clampDay(y, m, cutDay));
    }

    return {
      startISO: isoFromDate(start),
      endISO: isoFromDate(end)
    };
  }

  function isDateBetween(iso, startISO, endISO){
    return iso >= startISO && iso <= endISO;
  }

  function getCardPurchases(cardId){
    return state.expenses
      .filter(e => e.cardId === cardId && e.mode === "purchase_card")
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getCardPayments(cardId){
    return state.expenses
      .filter(e => e.cardId === cardId && e.mode === "payment_card")
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getCardDebt(cardId){
    return Math.max(0, getCardPurchases(cardId) - getCardPayments(cardId));
  }

  function getCardAvailable(card){
    return Math.max(0, Number(card.creditLimit||0) - getCardDebt(card.id));
  }

  function getCardUsagePercent(card){
    const limit = Number(card.creditLimit || 0);
    if(limit <= 0) return 0;
    return Math.min(100, (getCardDebt(card.id) / limit) * 100);
  }

  function getCardCyclePurchases(card){
    const range = getCurrentCycle(card);
    return state.expenses
      .filter(e =>
        e.cardId === card.id &&
        e.mode === "purchase_card" &&
        isDateBetween(e.date, range.startISO, range.endISO)
      )
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getCardCyclePayments(card){
    const range = getCurrentCycle(card);
    return state.expenses
      .filter(e =>
        e.cardId === card.id &&
        e.mode === "payment_card" &&
        isDateBetween(e.date, range.startISO, range.endISO)
      )
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function cardTotals(cardId){
    const card = state.cards.find(c=>c.id===cardId);
    const totalPurchases = getCardPurchases(cardId);
    const totalPayments = getCardPayments(cardId);
    const currentDebt = getCardDebt(cardId);

    let cycleTotal = 0;
    let cycleRange = null;

    if(card){
      cycleRange = getCurrentCycle(card);
      cycleTotal = getCardCyclePurchases(card) - getCardCyclePayments(card);
      if(cycleTotal < 0) cycleTotal = 0;
    }

    return {
      totalPurchases,
      totalPayments,
      currentDebt,
      cycleTotal,
      cycleRange,
      available: card ? getCardAvailable(card) : 0
    };
  }

  function getIncomeTotalByMonth(selectedMonth){
    return state.incomes
      .filter(i=>monthKey(i.date) === selectedMonth)
      .reduce((s,i)=>s+Number(i.amount||0),0);

  function getIncomeByTypeMonth(type, selectedMonth){
    return state.incomes
      .filter(i=>monthKey(i.date) === selectedMonth && i.type === type)
      .reduce((s,i)=>s+Number(i.amount||0),0);

  function getNominaTotalMonth(selectedMonth){
    return getIncomeByTypeMonth("Nómina", selectedMonth);
  }

  function getCardPaymentsFromNomina(selectedMonth){
    return state.expenses

        monthKey(e.date) === selectedMonth &&
        e.mode === "payment_card" &&
        e.sourceIncomeType === "Nómina"

  }

  function getNextPaymentDate(card){
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const y = today.getFullYear();
    const m = today.getMonth();
    const payDay = Number(card.payDay || 1);

    let target;
    const dayThisMonth = clampDay(y, m, payDay);

    if(today.getDate() <= dayThisMonth){
      target = new Date(y, m, dayThisMonth);
    } else {
      const nextMonth = new Date(y, m + 1, 1);
      target = new Date(
        nextMonth.getFullYear(),
        nextMonth.getMonth(),
        clampDay(nextMonth.getFullYear(), nextMonth.getMonth(), payDay)
      );
    }

    return target;
  }

  function daysUntil(dateObj){
    const today = new Date();
    const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const target = new Date(dateObj.getFullYear(), dateObj.getMonth(), dateObj.getDate());
    return Math.round((target - start) / 86400000);
  }

  function paymentBadgeClass(days){
    if(days <= 0) return "today";
    if(days === 1) return "tomorrow";
    if(days <= 7) return "soon";
    return "later";
  }

  function paymentBadgeText(days){
    if(days <= 0) return "Hoy";
    if(days === 1) return "Mañana";
    return `En ${days} días`;
  }

  function getUpcomingPayments(){
    return state.cards
      .map(card=>{
        const nextDate = getNextPaymentDate(card);
        const debt = getCardDebt(card.id);
        const cycle = cardTotals(card.id).cycleTotal;
        return {
          card,
          debt,
          cycle,
          nextDate,
          nextDateISO: isoFromDate(nextDate),
          daysLeft: daysUntil(nextDate)
        };
      })
      .filter(x=>x.debt > 0)
      .sort((a,b)=>{
        if(a.daysLeft !== b.daysLeft) return a.daysLeft - b.daysLeft;
        return b.debt - a.debt;
      });
  }

  function getUrgentPayments(){
    return getUpcomingPayments().filter(x => x.daysLeft <= 7);
  }

  function exportCSV(kind){
    let rows = [];
    let file = "";

    if(kind === "cards"){
      file = `gastos_tarjetas_${todayISO()}.csv`;
      rows = [
        ["id","tarjeta","corte","pago","limite_credito","deuda_actual","disponible","uso_porcentaje"],

          const debt = getCardDebt(card.id);
          const available = getCardAvailable(card);
          const used = getCardUsagePercent(card).toFixed(2);
          return [card.id, card.name, card.cutDay, card.payDay, card.creditLimit, debt, available, used];
        })
      ];
    }

    if(kind === "incomes"){
      file = `gastos_ingresos_${todayISO()}.csv`;
      rows = [
        ["id","fecha","mes","tipo","quincena","monto","nota"],
        ...state.incomes.map(i=>[i.id, i.date, monthKey(i.date), i.type, i.fortnight, i.amount, i.note])
      ];
    }

    if(kind === "expenses"){
      file = `gastos_egresos_${todayISO()}.csv`;
      rows = [
        ["id","fecha","mes","modo","tarjeta","categoria","monto","origen_ingreso","nota"],
        ...state.expenses.map(e=>[
          e.id,
          e.date,
          monthKey(e.date),
          EXPENSE_MODE_LABEL[e.mode] || e.mode,
          cardName(e.cardId),
          e.category,
          e.amount,
          e.sourceIncomeType || "",
          e.note
        ])
      ];
    }

    if(kind === "budgets"){
      file = `gastos_presupuestos_${todayISO()}.csv`;
      rows = [
        ["id","mes","categoria","monto_presupuestado","gastado","diferencia"],
        ...state.budgets.map(b=>{
          const spent = getSpentForBudgetCategory(b.month, b.category);
          return [b.id, b.month, b.category, b.amount, spent, b.amount - spent];
        })
      ];
    }

    const csv = rows.map(row => row.map(csvEscape).join(",")).join("\n");
    downloadTextFile(file, csv, "text/csv;charset=utf-8");
    toast("CSV exportado.");
  }

        state.cards = imported.cards;
        state.incomes = imported.incomes;
        state.expenses = imported.expenses;
        state.budgets = imported.budgets;

        ui.editingCardId = null;
        ui.editingIncomeId = null;

        save();
        render();
        toast("Respaldo importado correctamente.");

        alert("El archivo no es un respaldo válido.");
      }
    };
    reader.readAsText(file);
  }

        date,
        note,
        sourceIncomeType: mode === "payment_card" ? sourceIncomeType : ""
      };

      if(ui.editingExpenseId){
        const idx = state.expenses.findIndex(x=>x.id===ui.editingExpenseId);
        if(idx >= 0){
          state.expenses[idx] = payload;
        }
        ui.editingExpenseId = null;
        toast("Egreso actualizado.");
      } else {
        state.expenses.push(payload);
        toast("Egreso guardado.");
      }

      render();
      setTab("Egresos");
    };

    el.querySelector("#btnClearExpense").onclick = ()=>{
      ui.editingExpenseId = null;
      render();
    };

    if(el.querySelector("#btnCancelEditExpense")){
      el.querySelector("#btnCancelEditExpense").onclick = ()=>{
        ui.editingExpenseId = null;
        render();
      };
    }

    el.querySelector("#egMonth").onchange = render;
    el.querySelector("#egFilterCard").onchange = render;
    el.querySelector("#egFilterType").onchange = render;
    el.querySelector("#egSearch").oninput = (ev)=>{
      ui.expenseSearch = ev.target.value;
      render();
    };

    el.querySelectorAll("[data-editexpense]").forEach(btn=>{
      btn.onclick = ()=>{
        ui.editingExpenseId = btn.getAttribute("data-editexpense");
        render();
        window.scrollTo({top:0, behavior:"smooth"});
      };
    });

    el.querySelectorAll("[data-delexpense]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute("data-delexpense");
        if(confirm("¿Eliminar este egreso?")){
          state.expenses = state.expenses.filter(x=>x.id !== id);
          if(ui.editingExpenseId === id) ui.editingExpenseId = null;
          render();
          setTab("Egresos");
          toast("Egreso eliminado.", "warn");
        }
      };
    });
  }

  function renderResumen(){
    const el = document.getElementById("vResumen");
    const selectedMonth = document.getElementById("rMonth")?.value || monthKey(todayISO());
    const editingBudget = state.budgets.find(b => b.id === ui.editingBudgetId) || null;

    const incomesMonth = state.incomes.filter(i=>monthKey(i.date) === selectedMonth);
    const expensesMonth = state.expenses.filter(e=>monthKey(e.date) === selectedMonth);
    const upcoming = getUpcomingPayments();
    const urgent = getUrgentPayments();

    const totalIncome = incomesMonth.reduce((s,i)=>s+Number(i.amount||0),0);

    const totalCardPurchasesMonth = expensesMonth
      .filter(e=>e.mode === "purchase_card")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalCardPaymentsMonth = expensesMonth
      .filter(e=>e.mode === "payment_card")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalCashMonth = expensesMonth
      .filter(e=>e.mode === "cash")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalDebitMonth = expensesMonth
      .filter(e=>e.mode === "debit")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalTransferMonth = expensesMonth
      .filter(e=>e.mode === "transfer")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalRealSpendingMonth = expensesMonth
      .filter(e=>e.mode !== "payment_card")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalQ1 = incomesMonth
      .filter(i=>i.fortnight==="Q1")
      .reduce((s,i)=>s+Number(i.amount||0),0);

    const totalQ2 = incomesMonth
      .filter(i=>i.fortnight==="Q2")
      .reduce((s,i)=>s+Number(i.amount||0),0);

    const totalNomina = getNominaTotalMonth(selectedMonth);
    const nominaUsada = getCardPaymentsFromNomina(selectedMonth);
    const nominaDisponible = getNominaDisponibleMonth(selectedMonth);

    const totalDebtAllCards = state.cards.reduce((s,card)=>s + getCardDebt(card.id), 0);
    const totalAvailableAllCards = state.cards.reduce((s,card)=>s + getCardAvailable(card), 0);

    const cashFlowBalance = totalIncome - totalCardPaymentsMonth;
    const practicalBalance = totalIncome - totalRealSpendingMonth;

    const expenseByCategory = {};
    for(const c of PURCHASE_CATEGORIES) expenseByCategory[c] = 0;

    expensesMonth
      .filter(e=>e.mode !== "payment_card")
      .forEach(e=>{
        expenseByCategory[e.category] = (expenseByCategory[e.category] || 0) + Number(e.amount||0);
      });

    const budgetRows = PURCHASE_CATEGORIES.map(category=>{
      const budget = getBudgetForMonthCategory(selectedMonth, category);
      const spent = getSpentForBudgetCategory(selectedMonth, category);
      const percent = budgetPercent(spent, budget);
      return { category, budget, spent, diff: budget - spent, percent };
    }).filter(row => row.budget > 0 || row.spent > 0)
      .sort((a,b)=>b.spent - a.spent);

    const totalBudget = getTotalBudgetMonth(selectedMonth);
    const totalSpentAgainstBudget = getTotalSpentMonthWithoutCardPayments(selectedMonth);
    const totalBudgetDiff = totalBudget - totalSpentAgainstBudget;

    el.innerHTML = `
      <div class="card">
        <h3 class="sectionTitle">Pagos urgentes esta semana</h3>
        <div class="note">Aquí se concentran primero los pagos más cercanos para que no se te pasen.</div>
        <div style="height:10px"></div>
        ${renderUrgentPaymentsBlock(urgent)}
      </div>

      <div class="card">
        <h3 class="sectionTitle">Alertas de pago</h3>
        <div class="note">Estas alertas se calculan con la fecha de pago de cada tarjeta y la deuda actual.</div>
        <div style="height:10px"></div>
        ${renderUpcomingPaymentsBlock(upcoming.slice(0, 6))}
      </div>

      <div class="card">
        <h3 class="sectionTitle">Resumen mensual</h3>

        <div class="row two">
          <div>
            <label>Mes</label>
            <input type="month" id="rMonth" value="${selectedMonth}">
          </div>
          <div>
            <label>Ir a sección</label>
            <select id="rJump">
              <option value="Resumen">Resumen</option>
              <option value="Tarjetas">Tarjetas</option>
              <option value="Ingresos">Ingresos</option>
              <option value="Egresos">Egresos</option>
            </select>
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="kpi five">
          <div class="k">
            <div class="t">Ingresos Q1</div>
            <div class="v">${fmt(totalQ1)}</div>
          </div>
          <div class="k">
            <div class="t">Ingresos Q2</div>
            <div class="v">${fmt(totalQ2)}</div>
          </div>
          <div class="k">
            <div class="t">Total percibido</div>
            <div class="v">${fmt(totalIncome)}</div>
          </div>
          <div class="k">
            <div class="t">Compras con tarjeta</div>
            <div class="v">${fmt(totalCardPurchasesMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Pagos a tarjeta</div>
            <div class="v">${fmt(totalCardPaymentsMonth)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi five">
          <div class="k">
            <div class="t">Efectivo</div>
            <div class="v">${fmt(totalCashMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Débito</div>
            <div class="v">${fmt(totalDebitMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Transferencia</div>
            <div class="v">${fmt(totalTransferMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Gasto real del mes</div>
            <div class="v">${fmt(totalRealSpendingMonth)}</div>
          </div>
          <div class="k ${practicalBalance < 0 ? "negative" : "positive"}">
            <div class="t">Balance real del mes</div>
            <div class="v">${fmt(practicalBalance)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi four">
          <div class="k">
            <div class="t">Nómina del mes</div>
            <div class="v">${fmt(totalNomina)}</div>
          </div>
          <div class="k">
            <div class="t">Nómina usada en pagos</div>
            <div class="v">${fmt(nominaUsada)}</div>
          </div>
          <div class="k">
            <div class="t">Nómina disponible</div>
            <div class="v">${fmt(nominaDisponible)}</div>
          </div>
          <div class="k ${cashFlowBalance < 0 ? "negative" : "positive"}">
            <div class="t">Flujo vs pagos a tarjeta</div>
            <div class="v">${fmt(cashFlowBalance)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi two">
          <div class="k">
            <div class="t">Deuda total en tarjetas</div>
            <div class="v">${fmt(totalDebtAllCards)}</div>
          </div>
          <div class="k">
            <div class="t">Disponible total en tarjetas</div>
            <div class="v">${fmt(totalAvailableAllCards)}</div>
          </div>
        </div>

        <div class="infoBox">
          <b>Balance real del mes:</b> ingresos menos gastos reales del mes, es decir:
          compras con tarjeta + efectivo + débito + transferencia.
          <br><br>
          <b>Flujo vs pagos a tarjeta:</b> ingresos menos pagos a tarjeta del mes. Lo mantuve porque te ayuda a controlar con qué pagas la deuda, pero ahora ya tienes también un balance más práctico.
        </div>

        ${practicalBalance < 0
          ? `<div class="warnBox">Tu balance real del mes está en negativo. Tus gastos reales registrados superan tus ingresos del periodo.</div>`
          : `<div class="okBox">Tu balance real del mes está en positivo. Vas bien mientras tus registros estén completos.</div>`
        }
      </div>

      <div class="card">
        <div class="toolbar">
          <div class="left">
            <h3 class="sectionTitle" style="margin:0">${editingBudget ? "Editar presupuesto" : "Agregar presupuesto mensual"}</h3>
          </div>
          <div class="right">
            <button class="secondary small" id="btnExportBudgetCsv">CSV presupuestos</button>
          </div>
        </div>

        <div class="note">Define cuánto quieres gastar por categoría en cada mes.</div>

        <div style="height:10px"></div>

        <div class="row three">
          <div>
            <label>Mes</label>
            <input type="month" id="bMonth" value="${editingBudget?.month || selectedMonth}">
          </div>
          <div>
            <label>Categoría</label>
            <select id="bCategory">
              ${PURCHASE_CATEGORIES.map(c=>`<option ${editingBudget?.category===c?"selected":""}>${c}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>Monto presupuestado</label>
            <input id="bAmount" inputmode="decimal" placeholder="Ej. 2500" value="${editingBudget ? esc(String(editingBudget.amount)) : ""}">
          </div>
        </div>

        <div class="btns">
          <button class="good" id="btnSaveBudget">${editingBudget ? "Actualizar presupuesto" : "Guardar presupuesto"}</button>
          <button class="secondary" id="btnClearBudget">Limpiar</button>
          ${editingBudget ? `<button class="warn" id="btnCancelEditBudget">Cancelar edición</button>` : ""}
        </div>

        <div style="height:12px"></div>

        <div class="kpi three">
          <div class="k">
            <div class="t">Total presupuestado</div>
            <div class="v">${fmt(totalBudget)}</div>
          </div>
          <div class="k">
            <div class="t">Gastado contra presupuesto</div>
            <div class="v">${fmt(totalSpentAgainstBudget)}</div>
          </div>
          <div class="k ${totalBudgetDiff < 0 ? "negative" : "positive"}">
            <div class="t">Diferencia</div>
            <div class="v">${fmt(totalBudgetDiff)}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Presupuesto por categoría</h3>

        ${budgetRows.length ? `
          <div class="tableWrap">
            <table>
              <thead>
                <tr>
                  <th>Categoría</th>
                  <th>Presupuesto</th>
                  <th>Gastado</th>
                  <th>Disponible / Excedente</th>
                  <th>% usado</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody>
                ${budgetRows.map(row=>{
                  const budgetItems = state.budgets.filter(b => b.month === selectedMonth && b.category === row.category);
                  const firstId = budgetItems[0]?.id || "";
                  return `
                    <tr>
                      <td>${esc(row.category)}</td>
                      <td>${fmt(row.budget)}</td>
                      <td>${fmt(row.spent)}</td>
                      <td>${fmt(row.diff)}</td>
                      <td>
                        <div>${row.budget > 0 ? row.percent.toFixed(1) + "%" : "—"}</div>
                        <div class="progress">
                          <div class="bar ${budgetBarClass(row.percent)}" style="width:${Math.min(100, row.percent)}%"></div>
                        </div>
                      </td>
                      <td>
                        <div class="actions">
                          ${firstId ? `<button class="secondary small" data-editbudget="${firstId}">Editar</button>` : ""}
                          ${budgetItems.length ? `<button class="danger small" data-delbudgetcat="${esc(row.category)}">Eliminar</button>` : ""}
                        </div>
                      </td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        ` : `<div class="warnBox">Todavía no hay presupuestos o gastos por categoría en este mes.</div>`}
      </div>

      <div class="card">
        <h3 class="sectionTitle">Gastos reales por categoría</h3>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>Categoría</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody>
              ${PURCHASE_CATEGORIES
                .filter(c => (expenseByCategory[c] || 0) > 0)
                .sort((a,b)=>(expenseByCategory[b]||0) - (expenseByCategory[a]||0))
                .map(c=>`
                  <tr>
                    <td>${esc(c)}</td>
                    <td>${fmt(expenseByCategory[c] || 0)}</td>
                  </tr>
                `).join("") || `<tr><td colspan="2" class="note">No hay gastos reales registrados en este mes.</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Resumen por tarjeta</h3>
        ${state.cards.length ? `
          <div class="tableWrap">
            <table>
              <thead>
                <tr>
                  <th>Tarjeta</th>
                  <th>Límite</th>
                  <th>Total comprado</th>
                  <th>Total pagado</th>
                  <th>Deuda actual</th>
                  <th>Disponible</th>
                  <th>% usado</th>
                  <th>Monto del ciclo</th>
                  <th>Periodo del ciclo</th>
                </tr>
              </thead>
              <tbody>
                ${state.cards.map(card=>{
                  const t = cardTotals(card.id);
                  const usedPercent = getCardUsagePercent(card);
                  return `
                    <tr>
                      <td>${esc(card.name)}</td>
                      <td>${fmt(card.creditLimit)}</td>
                      <td>${fmt(t.totalPurchases)}</td>
                      <td>${fmt(t.totalPayments)}</td>
                      <td>${fmt(t.currentDebt)}</td>
                      <td>${fmt(t.available)}</td>
                      <td>${usedPercent.toFixed(1)}%</td>
                      <td>${fmt(t.cycleTotal)}</td>
                      <td>${t.cycleRange ? `${t.cycleRange.startISO} a ${t.cycleRange.endISO}` : "—"}</td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        ` : `<div class="warnBox">No hay tarjetas registradas todavía.</div>`}
      </div>
    `;

    el.querySelector("#btnExportBudgetCsv").onclick = ()=> exportCSV("budgets");

    el.querySelector("#btnSaveBudget").onclick = ()=>{
      const month = el.querySelector("#bMonth").value;
      const category = el.querySelector("#bCategory").value;
      const amount = parseMoney(el.querySelector("#bAmount").value);

      if(!month) return alert("Selecciona un mes.");
      if(!Number.isFinite(amount) || amount <= 0) return alert("Monto inválido.");

      if(ui.editingBudgetId){
        const idx = state.budgets.findIndex(b=>b.id===ui.editingBudgetId);
        if(idx >= 0){
          state.budgets[idx] = { ...state.budgets[idx], month, category, amount };
        }
        ui.editingBudgetId = null;
        toast("Presupuesto actualizado.");
      } else {
        const existing = state.budgets.find(b => b.month === month && b.category === category);
        if(existing){
          existing.amount = amount;
          toast("Presupuesto actualizado.");
        } else {
          state.budgets.push({ id: uid(), month, category, amount });
          toast("Presupuesto guardado.");
        }
      }

      render();
      setTab("Resumen");
    };

    el.querySelector("#btnClearBudget").onclick = ()=>{
      ui.editingBudgetId = null;
      render();
    };

    if(el.querySelector("#btnCancelEditBudget")){
      el.querySelector("#btnCancelEditBudget").onclick = ()=>{
        ui.editingBudgetId = null;
        render();
      };
    }

    el.querySelector("#rMonth").onchange = render;
    el.querySelector("#rJump").onchange = (ev)=> setTab(ev.target.value);

    el.querySelectorAll("[data-editbudget]").forEach(btn=>{
      btn.onclick = ()=>{
        ui.editingBudgetId = btn.getAttribute("data-editbudget");
        render();
        window.scrollTo({top:0, behavior:"smooth"});
      };
    });

    el.querySelectorAll("[data-delbudgetcat]").forEach(btn=>{
      btn.onclick = ()=>{
        const cat = btn.getAttribute("data-delbudgetcat");
        if(confirm(`¿Eliminar presupuesto de ${cat} para ${selectedMonth}?`)){
          state.budgets = state.budgets.filter(b => !(b.month === selectedMonth && b.category === cat));
          if(editingBudget?.category === cat && editingBudget?.month === selectedMonth){
            ui.editingBudgetId = null;
          }
          render();
          toast("Presupuesto eliminado.", "warn");
        }
      };
    });
  }

  document.getElementById("fechaHoy").textContent =
    new Date().toLocaleDateString("es-MX", { dateStyle:"full" });

  render();
</script>
</body>
</html>
