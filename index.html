<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Gastos</title>
  <meta name="theme-color" content="#0b1220" />
  <style>
    :root{
      --bg:#0b1220;
      --card:#121a2c;
      --fg:#e8f0ff;
      --muted:#93a4c7;
      --line:#1f2a40;
      --accent:#3b82f6;
      --good:#22c55e;
      --danger:#ef4444;
      --soft:#1b2740;
      --warn:#f59e0b;
      --r:16px;
      --navH:82px;
    }

    *{ box-sizing:border-box; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; }

    body{
      margin:0;
      color:var(--fg);
      background:
        radial-gradient(900px 500px at 15% -10%, rgba(59,130,246,.18), transparent 55%),
        radial-gradient(900px 500px at 90% 0%, rgba(34,197,94,.10), transparent 55%),
        linear-gradient(180deg, var(--bg), #0e1628);
    }

    header{
      position:sticky; top:0; z-index:20;
      background:color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter:blur(10px) saturate(160%);
      border-bottom:1px solid var(--line);
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .title{display:flex; flex-direction:column; gap:2px;}
    h1{margin:0; font-size:18px; letter-spacing:.2px;}
    .sub{font-size:12px; color:var(--muted);}
    .pill{
      font-size:12px; color:var(--muted);
      border:1px solid var(--line);
      padding:6px 10px;
      border-radius:999px;
      white-space:nowrap;
    }

    main{
      padding:14px 14px calc(var(--navH) + 22px);
      max-width:1120px;
      margin:0 auto;
    }

    .card{
      background:color-mix(in srgb, var(--card) 92%, rgba(59,130,246,.06));
      border:1px solid var(--line);
      border-radius:var(--r);
      padding:14px;
      box-shadow:0 12px 28px rgba(0,0,0,.25);
      margin-bottom:12px;
    }

    .row{display:grid; gap:10px;}
    @media(min-width:640px){
      .row.two{grid-template-columns:1fr 1fr;}
      .row.three{grid-template-columns:1fr 1fr 1fr;}
      .row.four{grid-template-columns:1fr 1fr 1fr 1fr;}
    }

    label{
      display:block;
      margin-bottom:6px;
      font-size:12px;
      color:var(--muted);
    }

    input, select, textarea{
      width:100%;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#0f172a;
      color:var(--fg);
      outline:none;
    }

    textarea{min-height:70px; resize:vertical;}

    .btns{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:10px;
    }

    button{
      border:0;
      border-radius:12px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      color:#fff;
      background:var(--accent);
    }
    button.secondary{background:var(--soft); border:1px solid var(--line);}
    button.good{background:var(--good);}
    button.danger{background:var(--danger);}
    button.warn{background:var(--warn); color:#111827;}
    button:active{transform:translateY(1px);}

    .kpi{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    @media(min-width:760px){
      .kpi.four{grid-template-columns:repeat(4,1fr);}
      .kpi.five{grid-template-columns:repeat(5,1fr);}
    }

    .k{
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:#0f172a;
    }
    .k .t{font-size:12px; color:var(--muted);}
    .k .v{font-size:18px; font-weight:900; margin-top:6px;}

    .view{display:none;}
    .view.active{display:block;}

    .bottomNav{
      position:fixed;
      left:0; right:0; bottom:0;
      height:var(--navH);
      padding:10px 10px calc(10px + env(safe-area-inset-bottom));
      border-top:1px solid var(--line);
      background:color-mix(in srgb, var(--bg) 86%, transparent);
      backdrop-filter:blur(10px) saturate(160%);
      display:flex;
      gap:10px;
      z-index:30;
      overflow-x:auto;
    }

    .tab{
      min-width:120px;
      flex:1;
      border:1px solid var(--line);
      border-radius:14px;
      background:var(--soft);
      color:var(--fg);
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      padding:0 10px;
      text-align:center;
    }

    .tab.active{
      background:linear-gradient(135deg, rgba(59,130,246,.85), rgba(34,197,94,.18));
      border-color:color-mix(in srgb, var(--accent) 60%, var(--line));
    }

    table{
      width:100%;
      border-collapse:collapse;
      overflow:hidden;
      border-radius:14px;
      border:1px solid var(--line);
    }

    th,td{
      padding:10px;
      border-bottom:1px solid var(--line);
      font-size:13px;
      vertical-align:top;
    }

    th{
      color:var(--muted);
      text-align:left;
      background:color-mix(in srgb, var(--card) 60%, var(--line));
    }

    tr:last-child td{border-bottom:0;}

    .note{
      font-size:12px;
      color:var(--muted);
      line-height:1.35;
    }

    .warnBox{
      border:1px solid color-mix(in srgb, var(--danger) 40%, var(--line));
      background:color-mix(in srgb, var(--danger) 10%, var(--card));
      padding:10px 12px;
      border-radius:12px;
      color:color-mix(in srgb, var(--fg) 92%, var(--muted));
      font-size:12px;
      margin-top:10px;
    }

    .okBox{
      border:1px solid color-mix(in srgb, var(--good) 40%, var(--line));
      background:color-mix(in srgb, var(--good) 10%, var(--card));
      padding:10px 12px;
      border-radius:12px;
      color:color-mix(in srgb, var(--fg) 92%, var(--muted));
      font-size:12px;
      margin-top:10px;
    }

    .sectionTitle{
      margin:0 0 10px;
      font-size:14px;
      color:var(--muted);
    }

    .hidden{ display:none !important; }
  </style>
</head>
<body>
  <header>
    <div class="title">
      <h1>Gastos</h1>
      <div class="sub">Control personal • Offline • Sin datos sensibles</div>
    </div>
    <div class="pill" id="fechaHoy">—</div>
  </header>

  <main>
    <section id="vTarjetas" class="view active"></section>
    <section id="vIngresos" class="view"></section>
    <section id="vEgresos" class="view"></section>
    <section id="vResumen" class="view"></section>
  </main>

  <nav class="bottomNav">
    <div class="tab active" data-tab="Tarjetas">▦ Tarjetas</div>
    <div class="tab" data-tab="Ingresos">💵 Ingresos</div>
    <div class="tab" data-tab="Egresos">－ Egresos</div>
    <div class="tab" data-tab="Resumen">☰ Resumen</div>
  </nav>

<script>
  const KEY = "app_gastos_final_v3";

  const state = JSON.parse(localStorage.getItem(KEY)) || {
    cards: [],     // {id, name, cutDay, payDay, creditLimit}
    incomes: [],   // {id, type, fortnight, amount, date, note}
    expenses: []   // {id, mode, category, cardId, amount, date, note, sourceIncomeType}
  };

  const INCOME_TYPES = [
    "Nómina",
    "Préstamo",
    "Venta",
    "Transferencia",
    "Devolución",
    "Apoyo familiar",
    "Ingreso extra",
    "Otro"
  ];

  const PURCHASE_CATEGORIES = [
    "Comida",
    "Transporte",
    "Gasolina",
    "Super",
    "Servicios",
    "Salud",
    "Escuela",
    "Viajes",
    "Ahorro",
    "Gastos generales",
    "Entretenimiento",
    "Compras",
    "Otro"
  ];

  // Migración de datos viejos
  state.expenses = (state.expenses || []).map(e => {
    if (e.mode) return e;
    if (e.category === "Pago de tarjeta de crédito") {
      return { ...e, mode: "payment" };
    }
    return { ...e, mode: "purchase" };
  });

  function save(){
    localStorage.setItem(KEY, JSON.stringify(state));
  }

  const fmt = (n)=> new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN"}).format(Number(n||0));
  const pad2 = (n)=> String(n).padStart(2,"0");

  function todayISO(){
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  function monthKey(iso){
    return (iso || "").slice(0,7);
  }

  function parseMoney(v){
    const x = Number(String(v).replace(/[^0-9.]/g,""));
    return Number.isFinite(x) ? x : NaN;
  }

  function uid(){
    return crypto.randomUUID ? crypto.randomUUID() : String(Date.now()) + Math.random();
  }

  function cardName(id){
    return state.cards.find(c=>c.id===id)?.name || "—";
  }

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;");
  }

  function isoFromDate(d){
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  function clampDay(year, monthIndex, day){
    const last = new Date(year, monthIndex + 1, 0).getDate();
    return Math.min(day, last);
  }

  function getCurrentCycle(card){
    const now = new Date();
    const y = now.getFullYear();
    const m = now.getMonth();
    const today = now.getDate();
    const cutDay = Number(card.cutDay);

    let start, end;

    if(today > cutDay){
      start = new Date(y, m, clampDay(y, m, cutDay) + 1);
      const nextMonth = new Date(y, m + 1, 1);
      end = new Date(
        nextMonth.getFullYear(),
        nextMonth.getMonth(),
        clampDay(nextMonth.getFullYear(), nextMonth.getMonth(), cutDay)
      );
    } else {
      const prevMonth = new Date(y, m - 1, 1);
      start = new Date(
        prevMonth.getFullYear(),
        prevMonth.getMonth(),
        clampDay(prevMonth.getFullYear(), prevMonth.getMonth(), cutDay) + 1
      );
      end = new Date(y, m, clampDay(y, m, cutDay));
    }

    return {
      startISO: isoFromDate(start),
      endISO: isoFromDate(end)
    };
  }

  function isDateBetween(iso, startISO, endISO){
    return iso >= startISO && iso <= endISO;
  }

  // =========================
  // Cálculos de tarjeta
  // =========================
  function getCardPurchases(cardId){
    return state.expenses
      .filter(e => e.cardId === cardId && e.mode === "purchase")
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getCardPayments(cardId){
    return state.expenses
      .filter(e => e.cardId === cardId && e.mode === "payment")
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getCardDebt(cardId){
    return Math.max(0, getCardPurchases(cardId) - getCardPayments(cardId));
  }

  function getCardAvailable(card){
    return Math.max(0, Number(card.creditLimit||0) - getCardDebt(card.id));
  }

  function getCardCyclePurchases(card){
    const range = getCurrentCycle(card);
    return state.expenses
      .filter(e =>
        e.cardId === card.id &&
        e.mode === "purchase" &&
        isDateBetween(e.date, range.startISO, range.endISO)
      )
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getCardCyclePayments(card){
    const range = getCurrentCycle(card);
    return state.expenses
      .filter(e =>
        e.cardId === card.id &&
        e.mode === "payment" &&
        isDateBetween(e.date, range.startISO, range.endISO)
      )
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function cardTotals(cardId){
    const card = state.cards.find(c=>c.id===cardId);
    const totalPurchases = getCardPurchases(cardId);
    const totalPayments = getCardPayments(cardId);
    const currentDebt = getCardDebt(cardId);

    let cycleTotal = 0;
    let cycleRange = null;

    if(card){
      cycleRange = getCurrentCycle(card);
      cycleTotal = getCardCyclePurchases(card) - getCardCyclePayments(card);
      if(cycleTotal < 0) cycleTotal = 0;
    }

    return {
      totalPurchases,
      totalPayments,
      currentDebt,
      cycleTotal,
      cycleRange,
      available: card ? getCardAvailable(card) : 0
    };
  }

  // =========================
  // Cálculos de ingresos
  // =========================
  function getIncomeTotalByMonth(selectedMonth){
    return state.incomes
      .filter(i=>monthKey(i.date) === selectedMonth)
      .reduce((s,i)=>s+Number(i.amount||0),0);
  }

  function getIncomeByTypeMonth(type, selectedMonth){
    return state.incomes
      .filter(i=>monthKey(i.date) === selectedMonth && i.type === type)
      .reduce((s,i)=>s+Number(i.amount||0),0);
  }

  function getNominaTotalMonth(selectedMonth){
    return getIncomeByTypeMonth("Nómina", selectedMonth);
  }

  function getCardPaymentsFromNomina(selectedMonth){
    return state.expenses
      .filter(e =>
        monthKey(e.date) === selectedMonth &&
        e.mode === "payment" &&
        e.sourceIncomeType === "Nómina"
      )
      .reduce((s,e)=>s+Number(e.amount||0),0);
  }

  function getNominaDisponibleMonth(selectedMonth){
    return Math.max(0, getNominaTotalMonth(selectedMonth) - getCardPaymentsFromNomina(selectedMonth));
  }

  // =========================
  // Tabs
  // =========================
  const TAB_TO_VIEW = {
    Tarjetas: "vTarjetas",
    Ingresos: "vIngresos",
    Egresos: "vEgresos",
    Resumen: "vResumen"
  };

  function setTab(name){
    document.querySelectorAll(".tab").forEach(t=>{
      t.classList.toggle("active", t.dataset.tab === name);
    });
    document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
    document.getElementById(TAB_TO_VIEW[name]).classList.add("active");
    render();
  }

  document.querySelectorAll(".tab").forEach(tab=>{
    tab.addEventListener("click", ()=> setTab(tab.dataset.tab));
  });

  function render(){
    renderTarjetas();
    renderIngresos();
    renderEgresos();
    renderResumen();
    save();
  }

  // =========================
  // TARJETAS
  // =========================
  function renderTarjetas(){
    const el = document.getElementById("vTarjetas");

    el.innerHTML = `
      <div class="card">
        <h3 class="sectionTitle">Agregar tarjeta</h3>
        <div class="note">Aquí registras nombre de tarjeta, fecha de corte, fecha de pago y saldo total.</div>

        <div style="height:10px"></div>

        <div class="row four">
          <div>
            <label>Nombre de tarjeta</label>
            <input id="cName" placeholder="Ej. Nu / BBVA / Liverpool / Suburbia">
          </div>
          <div>
            <label>Fecha de corte (día)</label>
            <select id="cCut">
              ${Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>Fecha de pago (día)</label>
            <select id="cPay">
              ${Array.from({length:31},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>Saldo total de la tarjeta</label>
            <input id="cLimit" inputmode="decimal" placeholder="Ej. 15000">
          </div>
        </div>

        <div class="btns">
          <button class="good" id="btnAddCard">Guardar tarjeta</button>
          <button class="secondary" id="btnClearCard">Limpiar</button>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Mis tarjetas</h3>
        <div class="note">El saldo disponible se reduce con las compras y vuelve a subir con los pagos a tarjeta.</div>

        <div style="height:10px"></div>

        ${state.cards.length ? `
          <table>
            <thead>
              <tr>
                <th>Tarjeta</th>
                <th>Corte</th>
                <th>Pago</th>
                <th>Saldo total</th>
                <th>Total comprado</th>
                <th>Total pagado</th>
                <th>Deuda actual</th>
                <th>Disponible</th>
                <th>Monto del ciclo</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${state.cards.map(card=>{
                const t = cardTotals(card.id);
                return `
                  <tr>
                    <td>${esc(card.name)}</td>
                    <td>Día ${card.cutDay}</td>
                    <td>Día ${card.payDay}</td>
                    <td>${fmt(card.creditLimit)}</td>
                    <td>${fmt(t.totalPurchases)}</td>
                    <td>${fmt(t.totalPayments)}</td>
                    <td>${fmt(t.currentDebt)}</td>
                    <td>${fmt(t.available)}</td>
                    <td>${fmt(t.cycleTotal)}</td>
                    <td><button class="danger" data-delcard="${card.id}">X</button></td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        ` : `<div class="warnBox">Aún no has agregado tarjetas.</div>`}

        <div style="height:12px"></div>
        <button class="danger" id="btnNuke">Borrar TODO</button>
        <div class="note" style="margin-top:8px">Esto borra tarjetas, ingresos y egresos del dispositivo.</div>
      </div>
    `;

    el.querySelector("#btnAddCard").onclick = ()=>{
      const name = el.querySelector("#cName").value.trim();
      const cutDay = Number(el.querySelector("#cCut").value);
      const payDay = Number(el.querySelector("#cPay").value);
      const creditLimit = parseMoney(el.querySelector("#cLimit").value);

      if(!name) return alert("Escribe el nombre de la tarjeta.");
      if(!(cutDay>=1 && cutDay<=31)) return alert("Fecha de corte inválida.");
      if(!(payDay>=1 && payDay<=31)) return alert("Fecha de pago inválida.");
      if(!Number.isFinite(creditLimit) || creditLimit <= 0) return alert("Saldo total inválido.");

      state.cards.push({
        id: uid(),
        name,
        cutDay,
        payDay,
        creditLimit
      });

      render();
      setTab("Tarjetas");
    };

    el.querySelector("#btnClearCard").onclick = ()=>{
      el.querySelector("#cName").value = "";
      el.querySelector("#cCut").value = "1";
      el.querySelector("#cPay").value = "1";
      el.querySelector("#cLimit").value = "";
    };

    el.querySelectorAll("[data-delcard]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute("data-delcard");
        if(confirm("¿Eliminar esta tarjeta?")){
          state.cards = state.cards.filter(c=>c.id !== id);
          render();
          setTab("Tarjetas");
        }
      };
    });

    el.querySelector("#btnNuke").onclick = ()=>{
      if(confirm("¿Seguro? Se borrará TODO.")){
        localStorage.removeItem(KEY);
        location.reload();
      }
    };
  }

  // =========================
  // INGRESOS
  // =========================
  function renderIngresos(){
    const el = document.getElementById("vIngresos");

    const selectedMonth = (document.getElementById("inMonth")?.value) || monthKey(todayISO());
    const selectedType = (document.getElementById("inFilterType")?.value) || "__all__";
    const selectedFortnight = (document.getElementById("inFilterQ")?.value) || "__all__";

    const filtered = state.incomes.filter(i=>{
      const okMonth = monthKey(i.date) === selectedMonth;
      const okType = selectedType === "__all__" || i.type === selectedType;
      const okQ = selectedFortnight === "__all__" || i.fortnight === selectedFortnight;
      return okMonth && okType && okQ;
    });

    const totalMonth = getIncomeTotalByMonth(selectedMonth);
    const totalFiltered = filtered.reduce((s,i)=>s+Number(i.amount||0),0);

    const totalQ1 = state.incomes
      .filter(i=>monthKey(i.date) === selectedMonth && i.fortnight === "Q1")
      .reduce((s,i)=>s+Number(i.amount||0),0);

    const totalQ2 = state.incomes
      .filter(i=>monthKey(i.date) === selectedMonth && i.fortnight === "Q2")
      .reduce((s,i)=>s+Number(i.amount||0),0);

    const totalNomina = getNominaTotalMonth(selectedMonth);
    const nominaUsada = getCardPaymentsFromNomina(selectedMonth);
    const nominaDisponible = getNominaDisponibleMonth(selectedMonth);

    el.innerHTML = `
      <div class="card">
        <h3 class="sectionTitle">Registrar ingreso</h3>
        <div class="note">Los ingresos están en lista desplegable y se separan por quincena.</div>

        <div style="height:10px"></div>

        <div class="row three">
          <div>
            <label>Tipo de ingreso</label>
            <select id="iType">
              ${INCOME_TYPES.map(t=>`<option>${t}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>Quincena</label>
            <select id="iFortnight">
              <option value="Q1">Q1</option>
              <option value="Q2">Q2</option>
            </select>
          </div>
          <div>
            <label>Fecha</label>
            <input id="iDate" type="date" value="${todayISO()}">
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="row two">
          <div>
            <label>Monto percibido</label>
            <input id="iAmount" inputmode="decimal" placeholder="Ej. 8500">
          </div>
          <div>
            <label>Nota (opcional)</label>
            <input id="iNote" placeholder="Ej. nómina, préstamo familiar, venta, etc.">
          </div>
        </div>

        <div class="btns">
          <button class="good" id="btnAddIncome">Guardar ingreso</button>
          <button class="secondary" id="btnClearIncome">Limpiar</button>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Filtro de ingresos</h3>

        <div class="row three">
          <div>
            <label>Mes</label>
            <input type="month" id="inMonth" value="${selectedMonth}">
          </div>
          <div>
            <label>Tipo</label>
            <select id="inFilterType">
              <option value="__all__">Todos</option>
              ${INCOME_TYPES.map(t=>`<option value="${esc(t)}">${esc(t)}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>Quincena</label>
            <select id="inFilterQ">
              <option value="__all__">Todas</option>
              <option value="Q1">Q1</option>
              <option value="Q2">Q2</option>
            </select>
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="kpi five">
          <div class="k">
            <div class="t">Total Q1</div>
            <div class="v">${fmt(totalQ1)}</div>
          </div>
          <div class="k">
            <div class="t">Total Q2</div>
            <div class="v">${fmt(totalQ2)}</div>
          </div>
          <div class="k">
            <div class="t">Total del mes</div>
            <div class="v">${fmt(totalMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Nómina usada en pagos</div>
            <div class="v">${fmt(nominaUsada)}</div>
          </div>
          <div class="k">
            <div class="t">Nómina disponible</div>
            <div class="v">${fmt(nominaDisponible)}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Lista de ingresos</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tipo</th>
              <th>Quincena</th>
              <th>Monto</th>
              <th>Nota</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length ? filtered
              .slice()
              .sort((a,b)=>a.date < b.date ? 1 : -1)
              .map(i=>`
                <tr>
                  <td>${i.date}</td>
                  <td>${esc(i.type)}</td>
                  <td>${i.fortnight}</td>
                  <td>${fmt(i.amount)}</td>
                  <td>${esc(i.note || "")}</td>
                  <td><button class="danger" data-delincome="${i.id}">X</button></td>
                </tr>
              `).join("")
              : `<tr><td colspan="6" class="note">No hay ingresos para ese filtro.</td></tr>`
            }
          </tbody>
        </table>
      </div>
    `;

    el.querySelector("#inFilterType").value = selectedType;
    el.querySelector("#inFilterQ").value = selectedFortnight;

    el.querySelector("#btnAddIncome").onclick = ()=>{
      const type = el.querySelector("#iType").value;
      const fortnight = el.querySelector("#iFortnight").value;
      const date = el.querySelector("#iDate").value;
      const amount = parseMoney(el.querySelector("#iAmount").value);
      const note = el.querySelector("#iNote").value.trim();

      if(!date) return alert("Selecciona una fecha.");
      if(!Number.isFinite(amount) || amount <= 0) return alert("Monto inválido.");

      state.incomes.push({
        id: uid(),
        type,
        fortnight,
        date,
        amount,
        note
      });

      render();
      setTab("Ingresos");
    };

    el.querySelector("#btnClearIncome").onclick = ()=>{
      el.querySelector("#iType").selectedIndex = 0;
      el.querySelector("#iFortnight").value = "Q1";
      el.querySelector("#iDate").value = todayISO();
      el.querySelector("#iAmount").value = "";
      el.querySelector("#iNote").value = "";
    };

    el.querySelector("#inMonth").onchange = render;
    el.querySelector("#inFilterType").onchange = render;
    el.querySelector("#inFilterQ").onchange = render;

    el.querySelectorAll("[data-delincome]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute("data-delincome");
        state.incomes = state.incomes.filter(x=>x.id !== id);
        render();
        setTab("Ingresos");
      };
    });
  }

  // =========================
  // EGRESOS
  // =========================
  function renderEgresos(){
    const el = document.getElementById("vEgresos");

    const selectedMonth = (document.getElementById("egMonth")?.value) || monthKey(todayISO());
    const selectedCard = (document.getElementById("egFilterCard")?.value) || "__all__";
    const selectedType = (document.getElementById("egFilterType")?.value) || "__all__";

    const filtered = state.expenses.filter(e=>{
      const okMonth = monthKey(e.date) === selectedMonth;
      const okCard = selectedCard === "__all__" || e.cardId === selectedCard;
      const okType = selectedType === "__all__" || e.mode === selectedType;
      return okMonth && okCard && okType;
    });

    const totalMonth = state.expenses
      .filter(e=>monthKey(e.date) === selectedMonth)
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalFiltered = filtered.reduce((s,e)=>s+Number(e.amount||0),0);

    const totalPurchasesMonth = state.expenses
      .filter(e=>monthKey(e.date) === selectedMonth && e.mode === "purchase")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalPaymentsMonth = state.expenses
      .filter(e=>monthKey(e.date) === selectedMonth && e.mode === "payment")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    el.innerHTML = `
      <div class="card">
        <h3 class="sectionTitle">Registrar egreso</h3>
        <div class="note">Ahora está separado en dos modos: <b>Compra con tarjeta</b> y <b>Pago a tarjeta</b>. Al cambiar el modo, cambia inmediatamente el área del formulario.</div>

        ${state.cards.length ? "" : `<div class="warnBox">Primero agrega al menos una tarjeta en la pestaña Tarjetas.</div>`}

        <div style="height:10px"></div>

        <div class="row two">
          <div>
            <label>Tipo de egreso</label>
            <select id="eMode">
              <option value="purchase">Compra con tarjeta</option>
              <option value="payment">Pago a tarjeta</option>
            </select>
          </div>
          <div>
            <label>Tarjeta</label>
            <select id="eCard">
              ${state.cards.length
                ? state.cards.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")
                : `<option value="">Primero agrega una tarjeta</option>`
              }
            </select>
          </div>
        </div>

        <div style="height:10px"></div>

        <div id="purchaseFields">
          <div class="row three">
            <div>
              <label>Categoría de compra</label>
              <select id="eCategory">
                ${PURCHASE_CATEGORIES.map(c=>`<option>${c}</option>`).join("")}
              </select>
            </div>
            <div>
              <label>Fecha de compra</label>
              <input id="eDatePurchase" type="date" value="${todayISO()}">
            </div>
            <div>
              <label>Monto de compra</label>
              <input id="eAmountPurchase" inputmode="decimal" placeholder="Ej. 450.75">
            </div>
          </div>

          <div style="height:10px"></div>

          <div class="row two">
            <div>
              <label>Nota (opcional)</label>
              <input id="eNotePurchase" placeholder="Ej. súper, gasolina, comida, etc.">
            </div>
            <div>
              <label>Información</label>
              <div class="okBox">Las compras aumentan la deuda de la tarjeta y reducen el saldo disponible.</div>
            </div>
          </div>
        </div>

        <div id="paymentFields" class="hidden">
          <div class="row three">
            <div>
              <label>Fecha de pago</label>
              <input id="eDatePayment" type="date" value="${todayISO()}">
            </div>
            <div>
              <label>Monto de pago</label>
              <input id="eAmountPayment" inputmode="decimal" placeholder="Ej. 1200">
            </div>
            <div>
              <label>Origen del dinero</label>
              <select id="eSourceIncomeType">
                <option value="">No aplica</option>
                ${INCOME_TYPES.map(t=>`<option>${t}</option>`).join("")}
              </select>
            </div>
          </div>

          <div style="height:10px"></div>

          <div class="row two">
            <div>
              <label>Nota (opcional)</label>
              <input id="eNotePayment" placeholder="Ej. pago mínimo, pago total, abono, etc.">
            </div>
            <div>
              <label>Información</label>
              <div class="okBox">Los pagos reducen la deuda de la tarjeta. Si eliges origen <b>Nómina</b>, también se descuenta de la nómina disponible del mes.</div>
            </div>
          </div>
        </div>

        <div class="btns">
          <button id="btnAddExpense">Guardar egreso</button>
          <button class="secondary" id="btnClearExpense">Limpiar</button>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Filtro de egresos</h3>
        <div class="row three">
          <div>
            <label>Mes</label>
            <input type="month" id="egMonth" value="${selectedMonth}">
          </div>
          <div>
            <label>Tarjeta</label>
            <select id="egFilterCard">
              <option value="__all__">Todas</option>
              ${state.cards.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>Tipo de egreso</label>
            <select id="egFilterType">
              <option value="__all__">Todos</option>
              <option value="purchase">Compras con tarjeta</option>
              <option value="payment">Pagos a tarjeta</option>
            </select>
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="kpi four">
          <div class="k">
            <div class="t">Compras del mes</div>
            <div class="v">${fmt(totalPurchasesMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Pagos del mes</div>
            <div class="v">${fmt(totalPaymentsMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Total egresos del mes</div>
            <div class="v">${fmt(totalMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Total filtrado</div>
            <div class="v">${fmt(totalFiltered)}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Lista de egresos</h3>
        <table>
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Tarjeta</th>
              <th>Tipo</th>
              <th>Categoría / Origen</th>
              <th>Monto</th>
              <th>Nota</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            ${filtered.length ? filtered
              .slice()
              .sort((a,b)=>a.date < b.date ? 1 : -1)
              .map(e=>`
                <tr>
                  <td>${e.date}</td>
                  <td>${esc(cardName(e.cardId))}</td>
                  <td>${e.mode === "purchase" ? "Compra" : "Pago a tarjeta"}</td>
                  <td>${e.mode === "purchase" ? esc(e.category) : esc(e.sourceIncomeType || "—")}</td>
                  <td>${fmt(e.amount)}</td>
                  <td>${esc(e.note || "")}</td>
                  <td><button class="danger" data-delexpense="${e.id}">X</button></td>
                </tr>
              `).join("")
              : `<tr><td colspan="7" class="note">No hay egresos para ese filtro.</td></tr>`
            }
          </tbody>
        </table>
      </div>
    `;

    const modeSelect = el.querySelector("#eMode");
    const purchaseFields = el.querySelector("#purchaseFields");
    const paymentFields = el.querySelector("#paymentFields");

    function syncExpenseModeUI(){
      const mode = modeSelect.value;
      purchaseFields.classList.toggle("hidden", mode !== "purchase");
      paymentFields.classList.toggle("hidden", mode !== "payment");
    }

    modeSelect.onchange = syncExpenseModeUI;
    syncExpenseModeUI();

    el.querySelector("#egFilterCard").value = selectedCard;
    el.querySelector("#egFilterType").value = selectedType;

    el.querySelector("#btnAddExpense").onclick = ()=>{
      if(!state.cards.length){
        alert("Primero agrega una tarjeta.");
        setTab("Tarjetas");
        return;
      }

      const mode = el.querySelector("#eMode").value;
      const cardId = el.querySelector("#eCard").value;
      const card = state.cards.find(c=>c.id === cardId);

      if(!cardId) return alert("Selecciona una tarjeta.");
      if(!card) return alert("Tarjeta no encontrada.");

      if(mode === "purchase"){
        const category = el.querySelector("#eCategory").value;
        const date = el.querySelector("#eDatePurchase").value;
        const amount = parseMoney(el.querySelector("#eAmountPurchase").value);
        const note = el.querySelector("#eNotePurchase").value.trim();

        if(!date) return alert("Selecciona una fecha de compra.");
        if(!Number.isFinite(amount) || amount <= 0) return alert("Monto inválido.");

        const available = getCardAvailable(card);
        if(amount > available){
          return alert("Esa compra supera el saldo disponible actual de la tarjeta.");
        }

        state.expenses.push({
          id: uid(),
          mode: "purchase",
          category,
          cardId,
          date,
          amount,
          note,
          sourceIncomeType: ""
        });
      } else {
        const date = el.querySelector("#eDatePayment").value;
        const amount = parseMoney(el.querySelector("#eAmountPayment").value);
        const note = el.querySelector("#eNotePayment").value.trim();
        const sourceIncomeType = el.querySelector("#eSourceIncomeType").value || "";

        if(!date) return alert("Selecciona una fecha de pago.");
        if(!Number.isFinite(amount) || amount <= 0) return alert("Monto inválido.");

        const debt = getCardDebt(cardId);
        if(amount > debt){
          return alert("El pago no puede ser mayor que la deuda actual de la tarjeta.");
        }

        if(sourceIncomeType === "Nómina"){
          const selectedM = monthKey(date);
          const nominaDisponible = getNominaDisponibleMonth(selectedM);
          if(amount > nominaDisponible){
            return alert("Ese pago supera la nómina disponible del mes.");
          }
        }

        state.expenses.push({
          id: uid(),
          mode: "payment",
          category: "Pago de tarjeta de crédito",
          cardId,
          date,
          amount,
          note,
          sourceIncomeType
        });
      }

      render();
      setTab("Egresos");
    };

    el.querySelector("#btnClearExpense").onclick = ()=>{
      el.querySelector("#eMode").value = "purchase";
      el.querySelector("#eCard").selectedIndex = 0;
      el.querySelector("#eCategory").selectedIndex = 0;
      el.querySelector("#eDatePurchase").value = todayISO();
      el.querySelector("#eAmountPurchase").value = "";
      el.querySelector("#eNotePurchase").value = "";
      el.querySelector("#eDatePayment").value = todayISO();
      el.querySelector("#eAmountPayment").value = "";
      el.querySelector("#eNotePayment").value = "";
      el.querySelector("#eSourceIncomeType").value = "";
      syncExpenseModeUI();
    };

    el.querySelector("#egMonth").onchange = render;
    el.querySelector("#egFilterCard").onchange = render;
    el.querySelector("#egFilterType").onchange = render;

    el.querySelectorAll("[data-delexpense]").forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute("data-delexpense");
        state.expenses = state.expenses.filter(x=>x.id !== id);
        render();
        setTab("Egresos");
      };
    });
  }

  // =========================
  // RESUMEN
  // =========================
  function renderResumen(){
    const el = document.getElementById("vResumen");

    const selectedMonth = (document.getElementById("rMonth")?.value) || monthKey(todayISO());

    const incomesMonth = state.incomes.filter(i=>monthKey(i.date) === selectedMonth);
    const expensesMonth = state.expenses.filter(e=>monthKey(e.date) === selectedMonth);

    const totalIncome = incomesMonth.reduce((s,i)=>s+Number(i.amount||0),0);
    const totalExpense = expensesMonth.reduce((s,e)=>s+Number(e.amount||0),0);
    const balance = totalIncome - totalExpense;

    const totalQ1 = incomesMonth
      .filter(i=>i.fortnight==="Q1")
      .reduce((s,i)=>s+Number(i.amount||0),0);

    const totalQ2 = incomesMonth
      .filter(i=>i.fortnight==="Q2")
      .reduce((s,i)=>s+Number(i.amount||0),0);

    const totalNomina = getNominaTotalMonth(selectedMonth);
    const nominaUsada = getCardPaymentsFromNomina(selectedMonth);
    const nominaDisponible = getNominaDisponibleMonth(selectedMonth);

    const totalPurchasesMonth = expensesMonth
      .filter(e=>e.mode === "purchase")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const totalPaymentsMonth = expensesMonth
      .filter(e=>e.mode === "payment")
      .reduce((s,e)=>s+Number(e.amount||0),0);

    const expenseByCategory = {};
    for(const c of PURCHASE_CATEGORIES) expenseByCategory[c] = 0;
    expensesMonth.filter(e=>e.mode === "purchase").forEach(e=>{
      expenseByCategory[e.category] = (expenseByCategory[e.category] || 0) + Number(e.amount||0);
    });

    const totalDebtAllCards = state.cards.reduce((s,card)=>s + getCardDebt(card.id), 0);
    const totalAvailableAllCards = state.cards.reduce((s,card)=>s + getCardAvailable(card), 0);

    el.innerHTML = `
      <div class="card">
        <h3 class="sectionTitle">Resumen mensual</h3>

        <div class="row two">
          <div>
            <label>Mes</label>
            <input type="month" id="rMonth" value="${selectedMonth}">
          </div>
          <div>
            <label>Ir a sección</label>
            <select id="rJump">
              <option value="Resumen">Resumen</option>
              <option value="Tarjetas">Tarjetas</option>
              <option value="Ingresos">Ingresos</option>
              <option value="Egresos">Egresos</option>
            </select>
          </div>
        </div>

        <div style="height:12px"></div>

        <div class="kpi five">
          <div class="k">
            <div class="t">Ingresos Q1</div>
            <div class="v">${fmt(totalQ1)}</div>
          </div>
          <div class="k">
            <div class="t">Ingresos Q2</div>
            <div class="v">${fmt(totalQ2)}</div>
          </div>
          <div class="k">
            <div class="t">Total percibido</div>
            <div class="v">${fmt(totalIncome)}</div>
          </div>
          <div class="k">
            <div class="t">Compras del mes</div>
            <div class="v">${fmt(totalPurchasesMonth)}</div>
          </div>
          <div class="k">
            <div class="t">Pagos a tarjeta del mes</div>
            <div class="v">${fmt(totalPaymentsMonth)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi four">
          <div class="k">
            <div class="t">Nómina del mes</div>
            <div class="v">${fmt(totalNomina)}</div>
          </div>
          <div class="k">
            <div class="t">Nómina usada en pagos</div>
            <div class="v">${fmt(nominaUsada)}</div>
          </div>
          <div class="k">
            <div class="t">Nómina disponible</div>
            <div class="v">${fmt(nominaDisponible)}</div>
          </div>
          <div class="k">
            <div class="t">Balance del mes</div>
            <div class="v">${fmt(balance)}</div>
          </div>
        </div>

        <div style="height:10px"></div>

        <div class="kpi two">
          <div class="k">
            <div class="t">Deuda total en tarjetas</div>
            <div class="v">${fmt(totalDebtAllCards)}</div>
          </div>
          <div class="k">
            <div class="t">Disponible total en tarjetas</div>
            <div class="v">${fmt(totalAvailableAllCards)}</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Compras por categoría</h3>
        <table>
          <thead>
            <tr>
              <th>Categoría</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody>
            ${PURCHASE_CATEGORIES.map(c=>`
              <tr>
                <td>${esc(c)}</td>
                <td>${fmt(expenseByCategory[c] || 0)}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>

      <div class="card">
        <h3 class="sectionTitle">Resumen por tarjeta</h3>
        ${state.cards.length ? `
          <table>
            <thead>
              <tr>
                <th>Tarjeta</th>
                <th>Saldo total</th>
                <th>Total comprado</th>
                <th>Total pagado</th>
                <th>Deuda actual</th>
                <th>Disponible</th>
                <th>Monto del ciclo</th>
                <th>Periodo del ciclo</th>
              </tr>
            </thead>
            <tbody>
              ${state.cards.map(card=>{
                const t = cardTotals(card.id);
                return `
                  <tr>
                    <td>${esc(card.name)}</td>
                    <td>${fmt(card.creditLimit)}</td>
                    <td>${fmt(t.totalPurchases)}</td>
                    <td>${fmt(t.totalPayments)}</td>
                    <td>${fmt(t.currentDebt)}</td>
                    <td>${fmt(t.available)}</td>
                    <td>${fmt(t.cycleTotal)}</td>
                    <td>${t.cycleRange ? `${t.cycleRange.startISO} a ${t.cycleRange.endISO}` : "—"}</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        ` : `<div class="warnBox">No hay tarjetas registradas todavía.</div>`}
      </div>
    `;

    el.querySelector("#rMonth").onchange = render;
    el.querySelector("#rJump").onchange = (ev)=> setTab(ev.target.value);
  }

  document.getElementById("fechaHoy").textContent =
    new Date().toLocaleDateString("es-MX", { dateStyle:"full" });

  render();
</script>
</body>
</html>
